<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黄衣低语 | The King in Yellow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap');
  :root {
    --black:#080a0f; --deep:#0d1117; --panel:#111820; --border:#1e2d3d;
    --dim:#2a3f52; --text:#a8b8c8; --muted:#5a7a8a; --accent:#4a9e8e;
    --danger:#8e2a2a; --sanity-color:#4a9e8e; --health-color:#8e4a2a;
    --gold:#b8962a; --yellow:#c8b820; --nyarla:#b040c0;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--black);color:var(--text);font-family:'IM Fell English',Georgia,serif;font-size:16px;line-height:1.7;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;}
  body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 40%,rgba(20,40,60,0.3) 0%,transparent 50%),radial-gradient(ellipse at 70% 70%,rgba(30,20,10,0.25) 0%,transparent 40%);animation:drift 20s ease-in-out infinite alternate;pointer-events:none;z-index:0;}
  @keyframes drift{0%{transform:translate(0,0) rotate(0deg)}100%{transform:translate(3%,2%) rotate(2deg)}}
  .game-container{position:relative;z-index:1;width:100%;max-width:820px;padding:24px 16px;display:flex;flex-direction:column;gap:16px;}
  .game-header{text-align:center;padding:20px 0 8px;border-bottom:1px solid var(--border);}
  .game-title{font-family:'Cinzel',serif;font-size:clamp(1.4rem,4vw,2.2rem);color:var(--yellow);letter-spacing:0.12em;text-shadow:0 0 30px rgba(200,184,32,0.4);}
  .game-subtitle{font-size:0.85rem;color:var(--muted);font-style:italic;margin-top:4px;}
  .stats-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .stat-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:10px 14px;}
  .stat-label{font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
  .stat-bar-wrap{height:6px;background:var(--dim);border-radius:3px;overflow:hidden;margin-bottom:4px;}
  .stat-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease,background 0.3s;}
  .stat-value{font-size:0.8rem;color:var(--text);}
  .sanity-fill{background:var(--sanity-color);}
  .health-fill{background:var(--health-color);}
  .corrupt-fill{background:var(--nyarla);}
  .items-count{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);}
  .scene-panel{background:var(--panel);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
  .scene-image{width:100%;height:180px;display:flex;align-items:center;justify-content:center;background:var(--deep);font-size:5rem;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
  .scene-image::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(8,10,15,0.7) 100%);}
  .scene-emoji{position:relative;z-index:1;filter:drop-shadow(0 0 20px rgba(200,184,32,0.25));animation:float 4s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-8px)}}
  .scene-content{padding:20px 24px;}
  .scene-location{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
  .scene-text{font-size:1rem;color:var(--text);line-height:1.8;font-style:italic;}
  .scene-text .highlight{color:var(--accent);font-style:normal;}
  .scene-text .yellow{color:var(--yellow);font-style:normal;}
  .scene-text .danger{color:#c05050;font-style:normal;}
  .scene-text .nyarla{color:var(--nyarla);font-style:normal;}
  .log-panel{background:var(--deep);border:1px solid var(--border);border-radius:4px;padding:14px 18px;height:120px;overflow-y:auto;scroll-behavior:smooth;}
  .log-panel::-webkit-scrollbar{width:4px;}
  .log-panel::-webkit-scrollbar-track{background:var(--deep);}
  .log-panel::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px;}
  .log-entry{font-size:0.82rem;color:var(--muted);padding:2px 0;border-bottom:1px solid rgba(30,45,61,0.4);}
  .log-entry:last-child{border:none;}
  .log-entry.new{color:var(--text);animation:fadeLog 0.4s ease;}
  .log-entry.danger{color:#c05050;}
  .log-entry.good{color:var(--accent);}
  .log-entry.warn{color:var(--gold);}
  .log-entry.corrupt{color:var(--nyarla);}
  @keyframes fadeLog{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:translateX(0)}}
  .choices-panel{display:flex;flex-direction:column;gap:8px;}
  .choice-btn{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:13px 20px;color:var(--text);font-family:'IM Fell English',Georgia,serif;font-size:0.95rem;text-align:left;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:12px;}
  .choice-btn:hover{border-color:var(--accent);background:rgba(74,158,142,0.08);color:#d0e8e0;transform:translateX(3px);}
  .choice-btn.evil{border-color:rgba(176,64,192,0.4);}
  .choice-btn.evil:hover{border-color:var(--nyarla);background:rgba(176,64,192,0.1);color:#e8c0f0;}
  .choice-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
  .choice-icon{font-size:1.1rem;flex-shrink:0;}
  .choice-cost{margin-left:auto;font-size:0.75rem;font-family:'Cinzel',serif;color:var(--muted);white-space:nowrap;}
  .nyarla-msg{background:rgba(80,0,100,0.2);border:1px solid rgba(176,64,192,0.5);border-radius:4px;padding:12px 16px;font-size:0.9rem;color:#d8a0e8;font-style:italic;position:relative;}
  .nyarla-msg::before{content:'奈亚子 ·';display:block;font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.2em;color:var(--nyarla);margin-bottom:5px;font-style:normal;}
  .inventory-panel{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:14px 18px;}
  .inv-title{font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.18em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
  .inv-items{display:flex;flex-wrap:wrap;gap:8px;}
  .inv-item{background:var(--deep);border:1px solid var(--dim);border-radius:3px;padding:5px 10px;font-size:0.8rem;color:var(--text);}
  .inv-empty{color:var(--muted);font-style:italic;font-size:0.85rem;}
  .overlay{position:fixed;inset:0;background:rgba(8,10,15,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;padding:32px;}
  .overlay.show{display:flex;animation:fadeIn 1s ease;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .overlay-icon{font-size:5rem;margin-bottom:20px;}
  .overlay-title{font-family:'Cinzel',serif;font-size:clamp(1.5rem,5vw,2.5rem);margin-bottom:12px;}
  .overlay-title.bad{color:#c05050;text-shadow:0 0 30px rgba(200,50,50,0.4);}
  .overlay-title.good{color:var(--accent);text-shadow:0 0 30px rgba(74,158,142,0.4);}
  .overlay-title.dark{color:var(--nyarla);text-shadow:0 0 30px rgba(176,64,192,0.5);}
  .overlay-title.yellow{color:var(--yellow);text-shadow:0 0 30px rgba(200,184,32,0.4);}
  .overlay-desc{color:var(--muted);font-style:italic;max-width:540px;margin-bottom:28px;line-height:1.8;font-size:0.95rem;}
  .restart-btn{background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'Cinzel',serif;font-size:0.9rem;letter-spacing:0.15em;padding:12px 32px;cursor:pointer;border-radius:3px;transition:all 0.2s;}
  .restart-btn:hover{background:rgba(74,158,142,0.15);}
  @keyframes insane{0%,100%{opacity:1}92%{opacity:1}94%{opacity:0.3}96%{opacity:1}98%{opacity:0.5}}
  .insane{animation:insane 3s infinite;}
  @keyframes corrupt-pulse{0%,100%{filter:hue-rotate(0deg)}50%{filter:hue-rotate(30deg) brightness(1.05)}}
  .corrupted{animation:corrupt-pulse 4s ease-in-out infinite;}
  .tentacle-bg{position:fixed;bottom:-5%;right:-5%;font-size:18rem;opacity:0.02;pointer-events:none;z-index:0;transform:rotate(-20deg);user-select:none;}
  .volume-btn{position:fixed;top:16px;right:16px;z-index:50;width:40px;height:40px;background:var(--panel);border:1px solid var(--border);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:border-color 0.2s,background 0.2s,transform 0.15s;color:var(--text);}
  .volume-btn:hover{border-color:var(--accent);background:rgba(74,158,142,0.12);transform:scale(1.08);}
  .volume-btn.muted{border-color:var(--danger);color:var(--muted);}
</style>
</head>
<body>
<audio id="bgm" src="DeepBelow.mp3" loop preload="auto"></audio>
<button class="volume-btn" id="volumeBtn" title="切换音乐" onclick="toggleVolume()">🔊</button>
<div class="tentacle-bg">👑</div>

<div class="overlay" id="gameOverOverlay">
  <div class="overlay-icon">💀</div>
  <div class="overlay-title bad">灵魂湮灭</div>
  <div class="overlay-desc" id="gameOverDesc"></div>
  <button class="restart-btn" onclick="restartGame()">再次探索</button>
</div>
<div class="overlay" id="endingOverlay">
  <div class="overlay-icon" id="endIcon"></div>
  <div class="overlay-title" id="endTitle"></div>
  <div class="overlay-desc" id="endDesc"></div>
  <button class="restart-btn" onclick="restartGame()">重新开始</button>
</div>

<div class="game-container" id="gameContainer">
  <div class="game-header">

    <div class="stat-card">

    </div>
    <div class="stat-card">
      <div class="stat-label">堕落值</div>
      <div class="stat-bar-wrap"><div class="stat-bar-fill corrupt-fill" id="corruptBar" style="width:0%"></div></div>
      <div class="stat-value"><span id="corruptVal">0</span> / 100</div>

  </div>
  <div class="scene-panel">
    <div class="scene-image"><div class="scene-emoji" id="sceneEmoji">👑</div></div>
    <div class="scene-content">
      <div class="scene-location" id="sceneLocation">——</div>
      <div class="scene-text" id="sceneText">正在加载...</div>
    </div>
  </div>
  <div class="nyarla-msg" id="nyarlaMsg" style="display:none;"></div>
  <div class="log-panel" id="logPanel"><div class="log-entry">游戏开始。愿你的理智坚如磐石。</div></div>
  <div class="choices-panel" id="choicesPanel"></div>
  <div class="inventory-panel">
    <div class="inv-title">随身物品</div>
    <div class="inv-items" id="invItems"><div class="inv-empty">空无一物</div></div>
  </div>
</div>

}
function hideNyarla() { document.getElementById("nyarlaMsg").style.display = "none"; }

  if (!scene) { console.warn("Missing scene:", sceneId); return; }

  document.getElementById("sceneEmoji").textContent = scene.emoji;
  document.getElementById("sceneLocation").textContent = scene.location;
  document.getElementById("sceneText").innerHTML = scene.text.replace(/\n/g,"<br>");
  hideNyarla();
  if (state.corruption >= 30 && state.corruption < 50 && Math.random() < 0.4) showNyarla();
  else if (state.corruption >= 50 && Math.random() < 0.65) showNyarla();
  const panel = document.getElementById("choicesPanel");
  panel.innerHTML = "";
  const hasItems = state.inventory.length > 0;
  scene.choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    if (choice.corruptCost) btn.classList.add("evil");
    let disabled = false;
    let costHTML = "";
    if (choice.requiresItem === true && !hasItems) { disabled = true; costHTML += `<span class="choice-cost" style="color:#c05050">需要道具</span>`; }
    if (typeof choice.requiresItem === "string" && !state.inventory.includes(choice.requiresItem)) { disabled = true; costHTML += `<span class="choice-cost" style="color:#c05050">需要 ${choice.requiresItem}</span>`; }
    if (choice.requiresCorrupt && state.corruption < 60) { disabled = true; costHTML += `<span class="choice-cost" style="color:var(--nyarla)">堕落值不足</span>`; }
    btn.disabled = disabled;
    btn.innerHTML = `<span class="choice-icon">${choice.icon}</span>${choice.text}${costHTML}`;
    btn.addEventListener("click", () => handleChoice(choice));
    panel.appendChild(btn);
  });
  updateStats();
}

function handleChoice(choice) {
  if (choice.sanityCost) { state.sanity = Math.max(0, state.sanity - choice.sanityCost); addLog("理智值 -"+choice.sanityCost,"danger"); }
  if (choice.healthCost) { state.health = Math.max(0, state.health - choice.healthCost); addLog("生命值 -"+choice.healthCost,"danger"); }
  if (choice.corruptCost) { state.corruption = Math.min(100, state.corruption + choice.corruptCost); addLog("堕落值 +"+choice.corruptCost,"corrupt"); }
  if (choice.item && !state.inventory.includes(choice.item)) { state.inventory.push(choice.item); addLog("获得道具："+choice.item,"good"); }
  addLog(choice.text,"new");
  updateStats();
  if (state.sanity <= 0) {
    document.getElementById("gameOverDesc").textContent = "你的理智在哈斯塔的存在面前彻底碎裂。你记得的最后一件事，是那首旋律终于变得清晰了——它是如此美丽，以至于你不再需要其他任何东西。";
    document.getElementById("gameOverOverlay").classList.add("show"); return;
  }
  if (state.health <= 0) {
    document.getElementById("gameOverDesc").textContent = "你的身体承受不住了。但在最后一刻，你听见哈斯塔叹了一口气——是惋惜，还是欣赏，你已经无法分辨。";
    document.getElementById("gameOverOverlay").classList.add("show"); return;
  }
  if (choice.next === "_restart") { restartGame(); return; }
  renderScene(choice.next);
}

function updateStats() {
  document.getElementById("sanityBar").style.width = state.sanity+"%";
  document.getElementById("healthBar").style.width = state.health+"%";
  document.getElementById("corruptBar").style.width = state.corruption+"%";
  document.getElementById("sanityVal").textContent = state.sanity;
  document.getElementById("healthVal").textContent = state.health;
  document.getElementById("corruptVal").textContent = state.corruption;
  const sc = state.sanity < 30 ? "#c08040" : state.sanity < 60 ? "#6a9e7e" : "#4a9e8e";
  document.getElementById("sanityBar").style.background = sc;
  const gc = document.getElementById("gameContainer");
  gc.classList.toggle("insane", state.sanity < 20);
  gc.classList.toggle("corrupted", state.corruption >= 60);
  const invEl = document.getElementById("invItems");
  invEl.innerHTML = state.inventory.length === 0 ? "<div class=\"inv-empty\">空无一物</div>" : state.inventory.map(i=>`<div class="inv-item">${i}</div>`).join("");
}

function addLog(text, type) {
  const log = document.getElementById("logPanel");
  const entry = document.createElement("div");
  entry.className = "log-entry" + (type ? " "+type : "");
  entry.textContent = text;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
  if (type === "new") setTimeout(()=>entry.classList.remove("new"),500);
}

function showEnding(key) {
  const d = endingData[key];
  if (!d) return;
  document.getElementById("endIcon").textContent = d.icon;
  document.getElementById("endTitle").className = "overlay-title "+d.cls;
  document.getElementById("endTitle").textContent = d.title;
  document.getElementById("endDesc").innerHTML = d.desc;
  document.getElementById("endingOverlay").classList.add("show");
}

function restartGame() {
  state = { sanity:100, health:100, corruption:0, inventory:[], currentScene:"start", flags:{} };
  document.getElementById("gameOverOverlay").classList.remove("show");
  document.getElementById("endingOverlay").classList.remove("show");
  document.getElementById("logPanel").innerHTML = "<div class=\"log-entry\">游戏重新开始。</div>";
  hideNyarla();
  renderScene("start");
}

const bgm = document.getElementById("bgm");
const volumeBtn = document.getElementById("volumeBtn");
let bgmMuted = false;
bgm.volume = 0.45;
bgm.play().then(()=>{ const s=document.getElementById("startSplash"); if(s)s.remove(); }).catch(()=>{
  const splash = document.createElement("div");
  splash.id = "startSplash";
  splash.style.cssText = "position:fixed;inset:0;z-index:999;background:rgba(8,10,15,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;";
  splash.innerHTML = `<div style="font-size:3rem;margin-bottom:16px;animation:float 3s ease-in-out infinite;">👑</div><div style="font-family:'Cinzel',serif;font-size:1rem;letter-spacing:0.25em;color:#c8b820;text-transform:uppercase;">点击任意处进入黄衣之王的世界</div><div style="font-size:0.75rem;color:#5a7a8a;margin-top:10px;font-style:italic;">Click anywhere to begin</div>`;
  splash.addEventListener("click",()=>{ bgm.play().catch(()=>{}); splash.style.opacity="0"; splash.style.transition="opacity 0.4s"; setTimeout(()=>splash.remove(),400); });
  document.body.appendChild(splash);
});
function toggleVolume() {
  bgmMuted = !bgmMuted; bgm.muted = bgmMuted;
  volumeBtn.textContent = bgmMuted ? "🔇" : "🔊";
  volumeBtn.classList.toggle("muted", bgmMuted);
  if (!bgmMuted && bgm.paused) bgm.play().catch(()=>{});
}

renderScene("start");
</script>
</body>
</html>
