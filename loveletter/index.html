<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竹节虫工作室 - 献给我游戏人生的情书 (Love Letter) 全局资产管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+SC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #1A1917;
            color: #E2DED6;
        }
        .disco-border { border: 2px solid #3A3630; }
        .disco-header {
            font-family: 'Cinzel', 'Noto Serif SC', serif;
            color: #D29944;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        .disco-input {
            background-color: #24221F;
            border: 1px solid #4A443C;
            color: #F1ECE1;
        }
        .disco-input:focus { border-color: #D29944; outline: none; }
        .active-tab {
            background-color: #3A3630;
            color: #FFC043;
            border-bottom: 3px solid #FFC043;
        }
        .disco-btn-purple {
            background-color: #4A354F;
            color: #E8D3EC;
            transition: all 0.2s;
        }
        .disco-btn-purple:hover {
            background-color: #63436A;
            color: #FFFFFF;
        }
    </style>
</head>
<body class="p-6">

    <header class="mb-8 p-6 bg-[#24221F] disco-border rounded shadow-xl flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold disco-header tracking-wider">献给我游戏人生的情书 / LOVE LETTER</h1>
            <p class="text-xs text-[#8A8173] mt-2 font-mono">STUDIO: PHASMIDS (竹节虫工作室) | 统一文档工作台 (完全解耦 CSV)</p>
        </div>
        <div class="flex space-x-3">
            <button onclick="exportAllToCSV()" class="disco-btn-purple px-4 py-2 rounded text-sm font-bold shadow">💾 导出全部 Tab (单CSV文件)</button>
            <label class="cursor-pointer bg-[#3E3A33] hover:bg-[#524C43] text-[#E2DED6] px-4 py-2 rounded text-sm font-bold shadow text-center">
                📂 导入全局 CSV 更新
                <input type="file" id="csvFileInput" accept=".csv" class="hidden" onchange="importAllFromCSV(event)">
            </label>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
        <div class="lg:col-span-1 bg-[#24221F] disco-border rounded p-4 h-fit shadow-lg">
            <h2 class="text-xs font-mono text-[#8A8173] uppercase tracking-widest mb-4 px-2">叙事资产大分类 (Modules)</h2>
            <nav class="space-y-1" id="moduleTabs">
                <button onclick="switchModule('世界线及设定')" id="tab-世界线及设定" class="w-full text-left px-3 py-3 rounded text-sm font-medium transition active-tab">⏳ 世界线及设定</button>
                <button onclick="switchModule('角色')" id="tab-角色" class="w-full text-left px-3 py-3 rounded text-sm font-medium transition text-[#A49B8D] hover:bg-[#2D2A25]">👥 角色 (AI/主角/NPC)</button>
                <button onclick="switchModule('梗与致敬作品')" id="tab-梗与致敬作品" class="w-full text-left px-3 py-3 rounded text-sm font-medium transition text-[#A49B8D] hover:bg-[#2D2A25]">🏆 梗与致敬作品</button>
                <button onclick="switchModule('装备及道具')" id="tab-装备及道具" class="w-full text-left px-3 py-3 rounded text-sm font-medium transition text-[#A49B8D] hover:bg-[#2D2A25]">🎒 装备及道具</button>
                <button onclick="switchModule('炊事系统')" id="tab-炊事系统" class="w-full text-left px-3 py-3 rounded text-sm font-medium transition text-[#A49B8D] hover:bg-[#2D2A25]">🍳 炊事系统 (古神猫饭)</button>
            </nav>
            <div class="mt-6 p-3 bg-[#1A1917] border border-[#3A3630] rounded">
                <p class="text-xs text-[#8A8173] leading-relaxed">
                    💡 <span class="text-[#D29944]">架构提示</span>：支持单文件保存。多成员通过 Excel / Google Sheets 协同编辑后，可一键导入恢复多维度全局标签页展示。
                </p>
            </div>
        </div>

        <div class="lg:col-span-3 flex flex-col space-y-4">
            <div class="bg-[#24221F] disco-border rounded p-4 shadow-lg flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="w-full md:w-1/2">
                    <input type="text" id="searchInput" oninput="filterData()" placeholder="🔍 检索当前大分类下的二级标签、场景或台词..." class="w-full disco-input px-3 py-2 rounded text-sm">
                </div>
                <div>
                    <button onclick="openAddModal()" class="bg-[#4E6148] hover:bg-[#5D7556] text-[#E8ECE7] px-4 py-2 rounded text-sm font-bold shadow">➕ 在当前大类新增条目</button>
                </div>
            </div>

            <div class="bg-[#24221F] disco-border rounded overflow-hidden shadow-xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-[#2D2A25] border-b border-[#3A3630] text-xs font-mono uppercase text-[#8A8173]">
                                <th class="p-3 w-24">唯一编码 (ID)</th>
                                <th class="p-3 w-36">二级分类 (Tag)</th>
                                <th class="p-3 w-40">关联主体/场景</th>
                                <th class="p-3">核心文本 / 台词 / 描述 (点击任意单元行编辑)</th>
                                <th class="p-3 w-24 text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody" class="text-sm divide-y divide-[#3A3630]">
                            <tr><td colspan="5" class="p-8 text-center text-[#8A8173] font-mono">⌛ 正在载入初始配置文件 data.csv...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-[#24221F] disco-border rounded-lg max-w-xl w-full p-6 shadow-2xl space-y-4">
            <h3 class="text-lg font-bold disco-header" id="modalTitle">编辑创意资产</h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-mono text-[#8A8173] mb-1">唯一编码 ID</label>
                    <input type="text" id="modalId" class="w-full disco-input px-3 py-2 rounded text-sm">
                </div>
                <div>
                    <label class="block text-xs font-mono text-[#8A8173] mb-1">大分类 (Module)</label>
                    <select id="modalModule" class="w-full disco-input px-3 py-2 rounded text-sm">
                        <option value="世界线及设定">世界线及设定</option>
                        <option value="角色">角色</option>
                        <option value="梗与致敬作品">梗与致敬作品</option>
                        <option value="装备及道具">装备及道具</option>
                        <option value="炊事系统">炊事系统</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-mono text-[#8A8173] mb-1">二级分类 Tag (如: AI伴侣/4个主角/上古卷轴/致敬作品)</label>
                    <input type="text" id="modalTag" class="w-full disco-input px-3 py-2 rounded text-sm" placeholder="请输入或指定具体的分类规范">
                </div>
                <div>
                    <label class="block text-xs font-mono text-[#8A8173] mb-1">关联主客体/场景/触发条件</label>
                    <input type="text" id="modalContext" class="w-full disco-input px-3 py-2 rounded text-sm">
                </div>
                <div>
                    <label class="block text-xs font-mono text-[#8A8173] mb-1">核心描述文本 / 吐槽台词</label>
                    <textarea id="modalText" rows="5" class="w-full disco-input px-3 py-2 rounded text-sm font-sans resize-none"></textarea>
                </div>
            </div>
            <div class="flex justify-end space-x-3 pt-2">
                <button onclick="closeModal()" class="bg-[#3E3A33] hover:bg-[#524C43] text-[#E2DED6] px-4 py-2 rounded text-sm">取消</button>
                <button onclick="saveModalData()" class="bg-[#D29944] hover:bg-[#E5AA55] text-[#1A1917] font-bold px-4 py-2 rounded text-sm">确认保存</button>
            </div>
        </div>
    </div>

    <script>
        let globalDatabase = [];
        let currentModule = '世界线及设定';
        let isEditMode = false;

        // 异步获取同级目录下的 data.csv
        async function loadInitialCSV() {
            try {
                const response = await fetch('data.csv');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const csvData = await response.text();
                parseAndLoadGlobalDatabase(csvData);
            } catch (error) {
                console.error(error);
                document.getElementById('dataTableBody').innerHTML = `
                    <tr>
                        <td colspan="5" class="p-8 text-center text-[#AE4A4A] font-mono leading-relaxed">
                            ❌ 无法自动读取本地 [data.csv]。<br>
                            <span class="text-xs text-[#8A8173]">提示：由于浏览器安全策略，直接双击运行 HTML 文件会产生跨域拦截。请在当前目录启动本地服务器（如 VS Code Live Server 或 Python Server），或者点击右上角 [导入全局 CSV 更新] 手动选中 data.csv 进行加载。</span>
                        </td>
                    </tr>`;
            }
        }

        function renderTable(dataToRender = null) {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';
            
            const displayRows = dataToRender || globalDatabase.filter(item => item.module === currentModule);
            
            if(displayRows.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-[#8A8173] font-mono">⚠️ 该分类下目前没有任何创意条目。</td></tr>`;
                return;
            }

            displayRows.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-[#2A2722] transition cursor-pointer";
                tr.onclick = (e) => { if(e.target.tagName !== 'BUTTON') openEditModal(row); };
                
                tr.innerHTML = `
                    <td class="p-3 font-mono text-[#D29944] font-bold">${row.id}</td>
                    <td class="p-3"><span class="bg-[#3A3630] text-[#FFC043] text-xs px-2 py-1 rounded border border-[#4A443C]">${row.tag}</span></td>
                    <td class="p-3 font-medium text-[#B5AD9E]">${row.context}</td>
                    <td class="p-3 text-[#F1ECE1] font-sans leading-relaxed break-all">${row.text}</td>
                    <td class="p-3 text-center">
                        <button onclick="deleteRow('${row.id}')" class="text-[#AE4A4A] hover:text-[#E05D5D] font-mono text-xs font-bold">❌ 删除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function switchModule(moduleKey) {
            document.querySelectorAll('#moduleTabs button').forEach(btn => {
                btn.className = "w-full text-left px-3 py-3 rounded text-sm font-medium transition text-[#A49B8D] hover:bg-[#2D2A25]";
            });
            document.getElementById(`tab-${moduleKey}`).className = "w-full text-left px-3 py-3 rounded text-sm font-medium transition active-tab";
            
            currentModule = moduleKey;
            document.getElementById('searchInput').value = '';
            renderTable();
        }

        function filterData() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const currentTabRows = globalDatabase.filter(item => item.module === currentModule);
            const filtered = currentTabRows.filter(row => 
                row.tag.toLowerCase().includes(query) || 
                row.context.toLowerCase().includes(query) || 
                row.text.toLowerCase().includes(query) ||
                row.id.toLowerCase().includes(query)
            );
            renderTable(filtered);
        }

        function openEditModal(row) {
            isEditMode = true;
            document.getElementById('modalTitle').innerText = "🔮 修改资产条目";
            document.getElementById('modalId').value = row.id;
            document.getElementById('modalId').disabled = true;
            document.getElementById('modalModule').value = row.module;
            document.getElementById('modalTag').value = row.tag;
            document.getElementById('modalContext').value = row.context;
            document.getElementById('modalText').value = row.text;
            document.getElementById('editModal').classList.remove('hidden');
        }

        function openAddModal() {
            isEditMode = false;
            document.getElementById('modalTitle').innerText = `➕ 新增条目`;
            document.getElementById('modalId').value = "NEW_" + Math.floor(Math.random()*100000);
            document.getElementById('modalId').disabled = false;
            document.getElementById('modalModule').value = currentModule;
            document.getElementById('modalTag').value = "";
            document.getElementById('modalContext').value = "";
            document.getElementById('modalText').value = "";
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('editModal').classList.add('hidden'); }

        function saveModalData() {
            const id = document.getElementById('modalId').value.trim();
            const moduleVal = document.getElementById('modalModule').value;
            const tag = document.getElementById('modalTag').value || "常规";
            const context = document.getElementById('modalContext').value || "通用";
            const text = document.getElementById('modalText').value || "";

            if(!id || !text) { alert("编码和核心内容不能为空！"); return; }

            if (isEditMode) {
                const index = globalDatabase.findIndex(item => item.id === id);
                if(index !== -1) {
                    globalDatabase[index] = { id, module: moduleVal, tag, context, text };
                }
            } else {
                globalDatabase.push({ id, module: moduleVal, tag, context, text });
            }
            closeModal();
            // 重新刷新以防修改了大类导致在当前页不可见
            renderTable();
        }

        function deleteRow(id) {
            if(confirm("确定彻底删除此项创意记录吗？")) {
                globalDatabase = globalDatabase.filter(item => item.id !== id);
                renderTable();
            }
        }

        function parseAndLoadGlobalDatabase(csvText) {
            const parsedRows = parseCSV(csvText);
            if(parsedRows.length < 2) return;
            
            const headers = parsedRows[0].map(h => h.replace(/^\uFEFF/, '').trim().toLowerCase());
            const idIdx = headers.indexOf("id");
            const modIdx = headers.indexOf("module");
            const tagIdx = headers.indexOf("tag");
            const ctxIdx = headers.indexOf("context");
            const txtIdx = headers.indexOf("text");

            const tempDatabase = [];
            for(let i = 1; i < parsedRows.length; i++) {
                const r = parsedRows[i];
                if(r.length < headers.length || !r[idIdx]) continue;

                tempDatabase.push({
                    id: r[idIdx].trim(),
                    module: modIdx !== -1 ? r[modIdx].trim() : "世界线及设定",
                    tag: tagIdx !== -1 ? r[tagIdx].trim() : "常规",
                    context: ctxIdx !== -1 ? r[ctxIdx].trim() : "全局",
                    text: r[txtIdx] || ""
                });
            }
            globalDatabase = tempDatabase;
            renderTable();
        }

        function parseCSV(text) {
            const lines = [];
            let row = [""];
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                let c = text[i];
                let next = text[i+1];
                if (c === '"') {
                    if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (c === ',' && !inQuotes) {
                    row.push('');
                } else if ((c === '\r' || c === '\n') && !inQuotes) {
                    if (c === '\r' && next === '\n') { i++; }
                    lines.push(row);
                    row = [''];
                } else {
                    row[row.length - 1] += c;
                }
            }
            if (row.length > 1 || row[0] !== '') lines.push(row);
            return lines;
        }

        function exportAllToCSV() {
            const fields = ["id", "module", "tag", "context", "text"];
            let csv = '\uFEFF'; 
            csv += fields.join(",") + "\r\n";
            
            globalDatabase.forEach(item => {
                let row = fields.map(fieldName => {
                    let escaped = String(item[fieldName]).replace(/"/g, '""');
                    if (escaped.search(/("|,|\n)/g) >= 0) { escaped = `"${escaped}"`; }
                    return escaped;
                });
                csv += row.join(",") + "\r\n";
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "data.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function importAllFromCSV(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                parseAndLoadGlobalDatabase(e.target.result);
                alert("📂 载入成功！全量 Tab 数据及关联大分类已被更新同步。");
            };
            reader.readAsText(file, 'UTF-8');
        }

        window.onload = () => { loadInitialCSV(); };
    </script>
</body>
</html>
