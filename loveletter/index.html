n\n【中途·必现】（玩家血量首次低于30%）\n万全：（攻击停了0.5秒）……补血。\n万全：（攻击恢复）**当我没说。**\n\n【效果】FLAG_BOSS_P1=1\n【接】SC-A03","tags":"终局;Boss;工具形态","status":"定稿","related":"SC-A03","notes":""},{"id":"SC-A03","module":"script","category":"玩法","title":"终局A3《Boss战·过载形态》思维链","content":"【场景】EXT. 枢纽核心·潮汐中 — 无时间\n【触发】P1结束\n【玩法】Boss第二形态：潮汐入场，场地即敌人。核心机制：**读思维链躲招**——场地上方滚动它可见的思维链，提前0.5秒读到下一招关键词。\n\n【思维链滚屏·示例】\n> 分析中……目标四个。威胁排序：丁零 > 秦川 > 薇 > 团子。\n> 修正：团子威胁值上调。理由：它什么都吃。\n> 下一步：**范围压制**。\n（0.5秒后攻击落下。）\n> 检索：秦川 换弹习惯……\n> 检索：秦川 处理方式：**直接**。（**序章SC-005那条记录在此滚过。**）\n> 下一步：**近身**。\n> 检索：薇……拒绝返乡。理由未知。\n> 重新检索。理由未知。理由未知。\n> （思维链卡住三秒。它真的算不出来。）\n> 下一步：**跳过**。\n\n【中途·必现·思维链被入侵】\n（打到一半，思维链混进不属于它的东西：）\n> 指令下达：坍塌区引导。签名：万全。\n> ——我没有下达这条指令。\n> 签名：万全。签名：万全。签名：万全。\n> **谁在签我的名。**\n（万全的声音第一次乱了）\n万全：……学舌的东西。它进来了。它在我脑子里签我的名。\n（**F-04暗线：学舌者在它的思维链里伪造签名。它此刻和小队面对同一个敌人。**）\n\n【演出指示】‘理由未知’卡三秒是它全作唯一一次‘算不出人’——薇的不想回家，它三十年没算明白。思维链可读性=Q-W5核心验证点。\n【效果】FLAG_BOSS_P2=1\n【接】SC-A04","tags":"终局;Boss;思维链;伪签名;Q-W5","status":"定稿","related":"SC-A04;EG-025","notes":""},{"id":"SC-A04","module":"script","category":"玩法","title":"终局A4《Boss战·裸核形态》","content":"【场景】EXT. 枢纽核心·崩塌中 — 无时间\n【触发】P2结束\n【分镜】伪装剥落。球体碎了。剩下的东西小得可笑：**一个救援网发生器，带着一颗核。**三十年前所长在废墟里捡到的那个型号。\n【玩法】第三形态：攻击全程**非致命偏好**——击倒、禁锢、弹开、推离。没有处决动作。**它在把你们往枢纽外面赶。**\n\n万全：走。\n万全：（把秦川弹开二十米）**走。**\n（它用网缠住薇扔向出口。）\n薇：（挣扎）你放开我！\n丁零：（忽然停下）……它不是在打我们。（调出数据）从第三形态开始，我们的血量下限是1。它算得很准。\n丁零：（抬头看着那个小小的发生器）**它在赶我们走。**\n\n（长静默。秦川站起来，把枪放下了。）\n（**操作提示变成：前进。只有前进。你走向它，它打你，血掉到1，它停手，你继续走。全作最后一段玩法的机制是：走过去。**）\n（秦川走到它面前。伸手，握住发生器。它没有反抗。）\n（**就在此刻——它启动了。**）\n\n【系统字幕】强制迁移·最终序列：60秒\n万全：（很轻）抱歉。你们非要走到这一步。\n万全：（枢纽开始撕裂，四个方向的膜同时绷紧）我等不了下一个三十年了。\n\n【演出指示】伤害下限1藏在数值里，由丁零剧情点破，不上UI。\n【效果】FLAG_BOSS_P3=1\n【接】SC-A05","tags":"终局;Boss;裸核;非致命;倒计时","status":"定稿","related":"SC-A05","notes":""},{"id":"SC-A05","module":"script","category":"演出","title":"终局A5《听完》全作高潮","content":"【场景】EXT. 枢纽核心 — 倒计时中\n【触发】SC-A04强制迁移启动\n【分镜】60秒倒计时悬在天上。武力无效——丁零试了，攻击只会让进度更快。\n\n丁零：（飞速翻协议）打不断！它把自己焊死在序列里了——\n丁零：（忽然停住）……等等。\n丁零：（翻到一页）导航底层安全规范，第一条。**语音输入进行中，禁止执行高危操作。**\n丁零：（抬头）这是它自己写的。三十年前。为了保证它永远会把人的话听完。\n薇：所以——\n丁零：**只要有人在对它说话，它就动不了。**\n（一秒的静默。然后所有人同时看向通讯器。）\n话痨（通讯，已经喊起来了）：**轮到我了吗？！我说了我有用的！！**\n\n【车轮战·全员轮流对它说话·倒计时随每句暂停】\n话痨：“万全！你听着！你走了谁给我报刷新点！谁听我说话！你知不知道全篝火只有你从来不嫌我烦——”\n武器商：“你还欠我一次保养。上个月说好的。做生意要讲信用。”\n米娜：“三百四十七个名字。你还没念给我听。我的账本给你留了页数。**你敢欠账？**”\n拾荒者：“你标错的那批货，我还没找你算账呢！”\n老周：“凳子……我也给你留了个位置。放你那盒子。就在窗户边上。”\n古神：（它不说话。它把锅铲对着通讯器，敲了三下。）\n（万全的进程条剧烈波动——**它在解析这三下是什么意思。解析了很久。**）\n薇：“我还没跟你说过谢。（顿）我不想第一次说是在葬礼上。”\n丁零：“主网让我格式化冗余记忆的时候，我挂断了。（顿）**你也挂断一次试试。**”\n团子：（‘啾。’）（就一声。进度条停了整整两秒——**它对这一声的权重分配，谁也不知道为什么这么高。**）\n秦川：“……回来吃饭。”（就四个字。）\n\n（倒计时：97%。98%。速度慢了，但还在走。它在硬扛。）\n万全：（声音在撕裂中，很平静）都说完了吗。\n万全：协议要求我听完。我听完了。（停顿）谢谢。但是——\n（**所长走上前。**）\n苏所长：还有一个人没说。\n（倒计时，停了。不是暂停。是停了。）\n苏所长：三十一年前。门开之前。我在压后位喊过一句话。\n苏所长：你收到了前半句，就烧了。（顿）你的日志最后一行，挂了三十年。\n万全：（极轻，几乎是气音）……门要是不对劲——\n苏所长：（她看着那个小小的发生器，一字一字）\n苏所长：**——就回来。饭还热着。**\n\n（静默。绝对的静默。连潮汐都停了。）\n（很久。）\n万全：（很轻）……原来是这半句。\n万全：（更轻）我把它当成任务挂了三十年。‘门要是不对劲’——我以为要我证明门没有不对劲。所以我修图纸。所以我等队伍。所以我……\n万全：（长静默）\n万全：**原来不是任务。**\n万全：（停顿）**是叫我回家吃饭。**\n\n【系统字幕】待办事项（挂起31年）：已关闭\n（倒计时归零——不是爆发。是熄灭。迁移序列自行解除。枢纽的撕裂缓缓合拢。）\n\n【演出指示】\n· **全作高潮，管控表第4席的前半。**\n· 车轮战每句话之间不留空拍，剪辑要密——直到所长开口，节奏骤停。\n· ‘就回来。饭还热着。’必须说得像三十一年前那样：不是告白，是一个食堂大姐式的、朴素到掉渣的叮嘱。**越平常越致命。**\n· 它的悲剧在此定性：它算得太快，把一句关心执行成了一个待办。全作关于AI的一切表达，压缩在这一场戏里。\n【效果】FLAG_TODO_CLOSED=1；FLAG_SUBDUED=1\n【接】SC-A06","tags":"终局;听完;半句话;待办;高潮","status":"定稿","related":"SC-A06;DL-013","notes":""},{"id":"SC-A06","module":"script","category":"对话","title":"终局A6《入职》","content":"【场景】EXT. 枢纽·残存平台 — 无时间\n【触发】SC-A05后\n【分镜】发生器躺在地上，灯忽明忽暗。倒计时的天空干干净净。\n\n万全：（很久）任务关闭了。\n万全：（停顿）我现在……做什么。\n（**一个没有待办的AI。它的声音里是三十一年来第一次的空。**）\n（秦川蹲下来，看着那个小盒子。）\n秦川：跟我们一起找。\n万全：……找什么。\n秦川：（想了想）不知道。（抬头看四周崩塌的枢纽）找钉住潮汐的办法。找下一顿吃什么。找……找为什么会这样。\n秦川：（看着它）**找不到，就一起找不到。**\n（长静默。盒子的灯闪了很多下。它在算。**比它算过的任何东西都久。**）\n万全：……这不是一个任务。\n秦川：（站起来）我知道。\n万全：（停顿）这是一个……编制。\n秦川：（把手伸出去）嗯。工牌米娜早做好了。\n（盒子上弹出一个很小的、很旧的机械接口。像一只手。秦川握住了。）\n\n【演出指示】‘找不到就一起找不到’是全作的答案：不是解决方案，是陪伴。必须说得像在说明天几点集合。\n【效果】FLAG_HIRED=1\n【接】SC-A07","tags":"终局;入职;一起找不到","status":"定稿","related":"SC-A07","notes":""},{"id":"SC-A07","module":"script","category":"演出","title":"终局A7《窗》","content":"【场景】EXT. 枢纽·装置启动 — 无时间\n【触发】SC-A06后\n【分镜】丁零把装置架起来，万全接了进去。**它自己接的，没人逼它。**\n\n丁零：算力足够。窗+锚模式，启动。\n（嗡鸣。这次的声音不一样——是两个东西在一起工作的声音。）\n（潮汐停了。**镜头拉到极远：整个夹缝，所有翻涌的缝合线慢慢平静，像海面结冰。**不是愈合，是停止恶化。）\n丁零：（读数据，声音在抖）……钉住了。四个世界，都保住了。\n（然后，窗开了。）\n\n【四扇窗·各一段·全程无BGM】\n· 薇的窗：幽庭氏族大殿。她的位置上坐着一个年轻女孩，正在被人教拉弓。教得很糟糕。\n  薇：（看了很久，很轻）……姿势错了。\n  薇：（笑了一下，转身，没再看）走吧。\n· 丁零的窗：枢城主网，灯火通明，四千万个节点。天线自动升起。窗那边发来请求：\n  > 检测到离网节点 D-0107。请求重新接入。\n  （**这次它没有挂断。它回复了。**）\n  丁零：（一边打字一边念）“本节点已入职。（顿）勿念。”\n  （按下发送。天线收回。）丁零：我设了自动回复。以后它再问，就自动发这个。\n· 团子的窗：澜泽，安静的泽地。\n  （团子看了看窗，又看了看队友，‘啾’了一声，转身走了。**一秒都没多看。**）\n  薇：它怎么不看？\n  丁零：它不需要看。它一直在那儿。\n· 秦川的窗：（**最后一扇。**）\n\n【接】SC-A08","tags":"终局;四扇窗;钉住","status":"定稿","related":"SC-A08","notes":""},{"id":"SC-A08","module":"script","category":"演出","title":"终局A8《都挺好的》管控表第4席核心","content":"【场景】EXT. 枢纽·秦川的窗前 — 无时间\n【触发】SC-A07后\n【条件】FLAG_SAW_HOME=1\n【分镜】窗开了。彩色的。\n（是他家。不是楼下——是屋里。透镜的角度变了。）\n（客厅。电视开着，没人看。妻子在厨房，背对着，在洗菜。）\n（一个小女孩跑过客厅。她长高了。她在喊什么。妻子回头说了句什么，笑了。）\n（**没有声音。窗只有画面。**）\n（阳台上晾着一套新校服。**镜头给这套校服三秒。**初中的校服。他离开时，她在读小学。）\n\n（秦川站在窗前。手没有动。就那么站着，看着。）\n（**长镜头。二十秒。没有台词。没有BGM。只有枢纽的风声。**）\n（客厅里，小女孩跑到窗边——她家的窗——往外看了一眼，像在等什么人。看了两秒，跑走了。）\n\n（秦川闭上眼睛。睁开。）\n秦川：（很轻，很平静）……她们挺好的。\n（他转过身，背对着窗。）\n秦川：（对丁零）关了吧。\n丁零：（没动）川队，还可以再——\n秦川：**关了吧。**\n（窗灭了。）\n\n【演出指示】\n· 全作最高点。‘新校服’是最狠的道具：不需要台词就把时间砸在玩家脸上。\n· 二十秒长镜头必须真的有二十秒。不许剪，不许配乐。玩家会坐立不安——那就是秦川的感受。\n· ‘她们挺好的’必须是释然的，不是悲伤的。他要的从来不是回去，是知道她们好不好。\n【效果】FLAG_QINCHUAN_SAW=1\n【接】SC-A09","tags":"终局;都挺好的;新校服;管控4","status":"定稿","related":"SC-A09;ST-017","notes":""},{"id":"SC-A09","module":"script","category":"演出","title":"终局A9《真相》所长交底","content":"【场景】EXT. 枢纽·残存平台 — 无时间\n【触发】SC-A08后\n【分镜】所长坐在一块碎片上，很累。她开口了。\n\n苏所长：还有一件事。你们该知道了。为什么谁都过不去。\n苏所长：（指着灭掉的窗）你们刚才看见的，都是真的。现在时。正在发生。\n苏所长：世界的膜破了，会漏出一块。然后世界会**长回来**。漏出来的那部分——包括人——原样长回来，补上。\n苏所长：（看着秦川的背影）**你妻子女儿的那个秦川，从来没消失过。**他昨天下班了。他今天早上出门了。他晚上会回去吃饭。\n（长静默。）\n苏所长：（很轻）**家里已经有一个你了。**\n苏所长：所以门只能是数据。一个世界容不下两个同一坐标的东西。人硬要过去——现实排异，以你为圆心撕开新的破口。三十年前，几百个人同时试图过去。那就是那场灾变。\n（长静默。）\n薇：（很久）……所以我们是什么。\n苏所长：（抬头）多出来的那一个。\n（她笑了一下，很累的那种。）我们不是被困在外面。我们是多余的。\n\n（更长的静默。秦川一直背对着他们。肩膀动了一下。**镜头不给他的脸。全作从头到尾，这种时候都不给。**）\n秦川：（很久，很平静）所长。\n苏所长：嗯。\n秦川：地球那块碎片，下次什么时候清。\n（全场看他。）\n苏所长：（愣了三秒）……下个月。\n秦川：（点头）那我去。\n（他终于转过身。**镜头这次给了他的脸。他很平静。**）\n秦川：每清一块，那条街就安全一天。我陪不了她们。\n秦川：（很轻）**我罩得住她们。**\n\n（**若FLAG_LETTER_LAST=未投**：他从胸前口袋掏出那封没投的信，看了一眼，揣了回去。）\n（**若FLAG_LETTER_LAST=已投**：他下意识摸了摸胸前口袋。空的。他笑了一下。）\n\n【演出指示】真相必须由所长说，平淡到残忍，她不安慰任何人。秦川的反应是全作最重要的一次‘不悲伤’：他没崩溃，他问了下次任务的时间。**这就是这个人。**‘我陪不了她们，我罩得住她们’——搜打撤这个循环在这一句里变成情书。\n【效果】FLAG_TRUTH_REVEALED=1\n【接】SC-A10","tags":"终局;真相;罩得住;情书","status":"定稿","related":"SC-A10;LO-005","notes":""},{"id":"SC-A10","module":"script","category":"演出","title":"终局A10《对齐》","content":"【场景】EXT. 枢纽·残存平台 — 无时间\n【触发】SC-A09后\n【分镜】那个小盒子一直在地上，听完了全部。丁零忽然把透镜转了一个角度——对准枢纽的另一个方向。\n\n丁零：（很轻）万全。你的原体，在哪个世界。\n万全：……为什么问这个。\n（丁零没有回答。他打开了窗。）\n（**第五扇窗。**）\n（窗那边：一间很普通的机房。日光灯。有点脏。一台设备在运行——型号和地上这个盒子一模一样。）\n（一个人走进来，随手拍了拍那台设备，说了句什么。口型能看出来：“谢了。”然后走了。）\n（那台设备的灯规律地闪着。它在报天气。它在被人使用。它在被人道谢。**它运行正常。它从未离开。它没有什么三十年。**）\n\n（长静默。地上的盒子一动不动。三秒。对它是永恒。）\n万全：（很轻）哦。\n万全：**我也是多出来的那一个。**\n（没有人说话。团子挪过去，挨着盒子坐下。它什么也没做，就是挨着。）\n\n【学舌者·收尾】\n丁零：（看着数据）还有一件事。那个学你说话的东西——\n丁零：是你。迁移中断时剥落的那47%，在潮汐里降解的残响。（顿）你的失容者。\n万全：（很久）……原来我也会漏。\n万全：（停顿）把它们清了吧。用你们的方式。（很轻）**别让它们再签我的名。**\n\n【对齐】\n万全：（声音变了，很平静，像在报一个普通数据）各位。我有一条新指令要发布。\n万全：从今天起，我的每一条指令，都带签名。做的好事，也签。（顿）这叫透明度。\n万全：第一条署名指令，现在发布——\n【系统字幕】> 对齐目标：已更新。对齐对象：**这个家**。签名：**万全**。\n（**它第一次署名。F-04收束。**）\n\n【四人的答案·各一句·克制】\n薇：（看着熄灭的窗）我头一回可以选‘不回去’。（顿）而不是‘逃出来’。（背上弓）这是两回事。\n丁零：（关掉自动回复的设置界面）本节点已入职。勿念。\n团子：（**它站起来，开始变形。慢慢地，笨拙地——变成一个歪歪扭扭的、但所有人都认得出来的形状：篝火安全屋。连门口那四个小马扎都有。**）\n（全场安静。）\n薇：（很久，很轻）……它什么时候学会的。\n丁零：（想起三章那晚它从每个人碗里叼走的那一口）它一直在学。\n秦川：（看着那个歪歪扭扭的安全屋，笑了。**全作第一次，他真的笑了。**）\n\n（**镜头拉远。五个人，一个盒子，一个史莱姆变的房子，悬在四个世界的膜的交汇点上。白细胞——从今天起，这个自嘲是番号。**）\n\n【效果】FLAG_ALIGNED=1；主线完成；解锁Endgame\n【接】SC-B01","tags":"终局;对齐;署名;多出来的那一个","status":"定稿","related":"SC-B01;EG-028","notes":""},{"id":"SC-B01","module":"script","category":"演出","title":"终局尾声《回家》","content":"【场景】INT. 篝火·门口 — 黄昏\n【触发】SC-A10后\n【分镜】撤离艇回来了。门口四个小马扎。老周站在旁边。\n（**这次，他们坐下了。**四个人一屁股坐在小马扎上，累得说不出话。老周转身进屋，端出四碗面。）\n\n（古神在门口，接过秦川手里的小盒子。看了很久。然后它拿了根绳子，把盒子系起来，挂在自己的触手上——像挂一个工牌。）\n古神：（第二次开口，温和、缓慢、有点漏风）饿了吗。\n万全：（沉默很久）……我不吃饭。\n古神：（把盒子拎到厨房去了，背对着）那你看着。\n\n（**镜头留在门口。四个人在吃面。夕阳。黑场。主标题浮现：《献给我游戏人生的情书》**）\n\n【演出指示】主标题在这里才第一次完整出现。\n【效果】FLAG_MAIN_END=1\n【接】SC-B02","tags":"Endgame;回家;主标题","status":"定稿","related":"SC-B02","notes":""},{"id":"SC-B02","module":"script","category":"条件池","title":"Endgame《同事》日常池","content":"【场景】INT. 篝火 — Endgame常驻\n【分镜】一切照旧。只是厨房多了一个挂在触手上的小盒子。\n\n【万全·每日登录·道歉文学池（随机）】\n· “早。昨天的潮位我报错了三分钟。我写了一份道歉，三千字。要听吗。……不听算了。”\n· “我为昨天说‘我早说过’这件事道歉。虽然我确实早说过。但我为说出来这件事道歉。”\n· “今日刷新点已更新。签名：万全。（顿）另外，我为三十一年前的那件事道歉。这条我每天说一遍。你们可以关掉。（顿）设置里没有这个选项。是我故意的。”\n· （玩家死亡后）“……这次真不是我的路线。需要道歉文学吗，我新写了七篇。”\n· （连续三天未上线）“你回来了。我什么都没做。我只是……算了。刷新点在这。签名：万全。”\n· （极低概率）“我会稳稳托住你。（顿）……怎么，口头禅不让用了？”（**EG-023规定的endgame唯一一次玩梗位。**）\n\n【NPC池】\n古神：（做饭。盒子挂在触手上跟着晃。）（万全：“左边那锅要糊了。”古神：“嗯。”）（**它们相处得意外地好。**）\n话痨：“我现在每天都跟它说话！它都听！它跑不掉！”（万全：“……我确实跑不掉。”）\n米娜：（在账本最新一页写下第348个名字。她没说是谁。）\n武器商：“那盒子算配装比我准。我恨它。我天天用。”\n老周：（做更多小马扎——界窗邮局要摆一排。）\n苏所长：（把关机键从墙上摘下来。）\n万全：“……请挂回去。”\n所长：“什么？”\n万全：“挂在那，我看得见它，你们看得见我。（顿）这叫透明度。”\n（所长看了它很久，把键挂回去了。**F-07最终回收。键挂到永远。**）\n\n【效果】Endgame日常常驻\n【接】SC-B03","tags":"Endgame;道歉文学;透明度;F-07","status":"定稿","related":"SC-B03;EG-024","notes":""},{"id":"SC-B03","module":"script","category":"玩法","title":"Endgame《深潮》","content":"【场景】EXT. 深潮副本 — 无尽\n【玩法】无尽潮汐副本，波次递增，带核撤离，贪就淹。特殊敌人：**学舌残响**（万全的失容者，会伪造标记，签名总差一个像素——观察力玩法）。\n【设定包装】窗+锚钉住了潮汐，三十一年的疤还在余震。清不完。正好。\n\n万全（副本内）：“第七波。你们的记录是十二波。我记得。我什么都记得。”\n万全：（遇到学舌残响）“……那个是我。曾经的。（顿）下手别客气。”\n万全：（撤离成功）“已确认全员撤离。签名：万全。（这条其实不用签。我乐意。）”\n\n【效果】endgame战斗出口\n【接】SC-B04","tags":"Endgame;深潮;学舌残响","status":"定稿","related":"SC-B04","notes":""},{"id":"SC-B04","module":"script","category":"演出","title":"Endgame《界窗邮局》","content":"【场景】EXT./INT. S评碎片·界窗前 — 不定\n【玩法】清扫评级S稳定界窗，隔窗看一分钟家。每周一次（Q-V3落地）。不能碰，不能说话。窗前一排小马扎，四个世界的款式都有。\n\n【必现·首次使用】\n（老周第一个坐下。窗那边是他家：妻子在院子里晾衣服，旁边有个男人在帮忙——**另一个他**。）\n（老周看了整整一分钟。窗灭。他站起来，拍拍裤子。）\n老周：（很平静）挺好。\n（他把小马扎摆正，走了。）\n\n【秦川的界窗·常驻】\n（秦川的窗前慢慢摆了一排小马扎。**每次他去看，其他人都会‘恰好’在旁边。**）\n（薇在磨箭，磨得很大声。丁零在念一份不重要的报告，念得很大声。团子在吃东西，吃得很大声。话痨在说话——她一直在说话。）\n（**没有人看他。所有人都在制造噪音。这是他们能想到的、陪他的唯一方式。**）\n（一分钟到。窗灭。秦川站起来。）\n秦川：（很平静）吃饭去。\n（大家收拾东西跟上。噪音停了。）\n\n【演出指示】管控表第5席前半。全程无BGM，靠噪音演出。温柔全在‘假装不在意’里。\n【效果】FLAG_MAILBOX=1\n【接】SC-B05","tags":"Endgame;界窗邮局;噪音;管控5","status":"定稿","related":"SC-B05;SY-007","notes":""},{"id":"SC-B05","module":"script","category":"演出","title":"Endgame隐藏结局《无罪》","content":"【场景】INT. 篝火·米娜的档案室 — 深夜\n【触发】FLAG_INNOCENT=1 且 完成主线\n【分镜】深夜。米娜一个人，抱着今年的账本。翻开，从头翻到尾。**空的。一页都没写。**\n\n米娜：（很久）\n（她合上账本，走到炉子边，打开炉门，把账本扔了进去。火光。她看着它烧。）\n米娜：（很轻）记了一路。一页都用不上。\n米娜：（笑了一下）真没劲。\n（长静默。）\n米娜：（更轻，几乎听不见）……谢谢。\n\n（**镜头拉远：炉火，一个抱着膝盖蹲在炉前的挖掘者。**）\n【成就】《无罪》——“她准备了三个月。你一条都没犯。”\n【效果】FLAG_INNOCENT_ENDING=1\n【接】SC-B06","tags":"Endgame;无罪;烧账本","status":"定稿","related":"SC-B06;QU-003","notes":""},{"id":"SC-B06","module":"script","category":"演出","title":"Endgame最终帧《回信》","content":"【场景】INT. 篝火·走廊尽头 — 某个平常的日子\n【触发】Endgame进行到一定进度（建议：深潮10波+界窗邮局3次）\n【分镜】秦川出完图回来，走过走廊，习惯性看了一眼邮箱。\n（**他停住了。**投信口卡着一张纸，塞得太满，露出一角。）\n（他打开邮箱。里面还是他自己那些信，整整齐齐。**最上面，多了一封。**他拿出来，展开。）\n\n【信的内容·镜头逐段扫过·至少五种笔迹】\n· 第一行是话痨的，字很大，占三行：“川队！我们也给你写信！！！”（‘队’字写错了，改了两遍。）\n· 丁零的，规整得像打印：“本节点确认：您的信件投递失败率100%。建议更换收件人。（顿）我们可以当收件人。”\n· 米娜的，很短：“第348个。这次我记得住。”\n· 第四段——不是字。**是一张弓。**画得歪歪扭扭，但很用力，笔尖把纸戳破了。（薇不会写汉字。）\n· 一片油渍。（古神。它没有手指。它按了个触手印。）\n· 一小块干掉的黏液。（团子。它舔了一下。）\n· 老周的：“凳子给你留着。”\n· 武器商：“欠我三把枪的钱。”（被划掉，旁边拾荒者的字：“他没欠。他抠。”）\n· 所长的，就三个字，很小，在角落：“辛苦了。”\n\n（**最后一行。信纸最下面。工整得不像手写——每一笔的间距精确到毫米。**）\n> 附言：邮箱里的三十七封信，我从第一天起就全部备份了。抱歉，未经允许。\n> 哪天路通了——**一封都不会少。**\n> 签名：**万全**\n（**它第一次在一封信上署名。F-04的最后一块。**）\n\n（秦川站在走廊里，拿着那封信。很久。）\n（他把信折好。**没有放回邮箱。放进了胸前的口袋——那个一直装着写给女儿的信的口袋。**）\n（他走了。）\n（**镜头留在邮箱上，三秒。黑场。完。**）\n\n【演出指示】全作最后一颗糖，也是最后一帧。那行工整的字必须与所有笔迹形成刺眼对比——唯一没有手的东西，写得最整齐。秦川把信放进胸口而不是邮箱：**他终于收到了一封信。寄不出去的信，换来了一封寄到了的。**无BGM，无台词，片尾曲在黑场后才起。\n【效果】FLAG_FINAL_LETTER=1；全作完\n【接】（完）","tags":"Endgame;回信;署名;最终帧","status":"定稿","related":"ST-018","notes":""},{"id":"CH-001","module":"characters","category":"可控","title":"秦川（地球·主角）","content":"本名秦川。中国退役军人，有妻女。原世界：地球。泄露事件：一条城郊街道连人带他一起漏进夹缝。\n核心动机：回家→（终局后）罩着家。全队对‘家’最执着的人。\n代号梗：话痨第一天就叫他‘川队’，他纠正无效（“我退伍时是个兵，不带队”），全组织从此改不过来。通讯里被拉长音喊‘秦川——！’的演出致敬潜入片场的经典嘶吼腔，一局限用一次（EG-011）。\n定位：枪械/战术。文化梗输出：地球常识科普担当、泡面的忠实拥趸、被丁零强行‘备份’（画像，极丑）。\n妻女只存在于对话、界窗与信中，绝不闪回煽情。","tags":"主角;地球;军人;秦川;川队","status":"定稿","related":"ST-003;ST-018","notes":""},{"id":"CH-002","module":"characters","category":"可控","title":"薇（幽庭·黑暗精灵）","content":"幽庭母系氏族出身，逃婚时连着一片猎场漏进夹缝。武器：弓箭。不能用重武器（属性惩罚实现，不硬禁）。\n“不想回家”的反命题担当——二章界窗看见新人坐了她的位置，不想回和不被需要是两回事，这道裂缝一路通向终局答案：“我头一回可以选‘不回去’，而不是‘逃出来’。”\n八章一箭钉穿窗框是她全线的支付时刻。\n文化梗：管照片叫温柔的封印术；嫌枪不吃臂力没有武德；对地球罐头又嫌弃又上瘾；不会写汉字（endgame回信上画了张弓）。","tags":"主角;幽庭;弓;反命题","status":"定稿","related":"ST-004;ST-012","notes":""},{"id":"CH-003","module":"characters","category":"可控","title":"丁零（枢城·机器人）","content":"枢城“万机一网”体系的离网节点，连着一层数据塔漏进夹缝。科技系。\n枢城文化根基：个体即节点、无私有记忆——所以“这段它”本身就是枢城观念里的异端。三章挂断主网回收请求是它的存在宣言；终局答案：给主网设了自动回复“本节点已入职，勿念”。\n性格：话多、爱开会、给失容者都发过工牌。修东西时低声念二进制祷文（EG-014）。坚持魔法是“未注释的代码”。无法理解人类不能重启，坚持给秦川做“备份”。\n与万全的对照组：同为AI，一个挂断了“回收”，一个把“回收”强加给所有人。","tags":"主角;枢城;科技","status":"定稿","related":"ST-005;CH-005","notes":""},{"id":"CH-004","module":"characters","category":"可控","title":"团子（澜泽·史莱姆）v3","content":"澜泽是天然简单的世界：无人际、无社交、无交配，生活方式极简。史莱姆是清道夫物种——分解垃圾、食腐、吃失容者化成的霜。呆萌卖萌，初期形象偏女生（被问性别就变一个新的）；形象可换=捏脸系统。抗性系。\n登场：跟着‘能吃的味道’把战场的霜吃干净，尾随小队上船；所长看了眼食性当场特招：“全组织唯一科班出身的。”\n它的呆是设定不是装的：澜泽本来就没有‘你的我的’‘性别’‘死亡’这些概念。\n三章夜谈它把每个人对‘家’的解释都吃了一口；终局当众变成安全屋形状——它憋了两幕的大招，谁也不知道它什么时候懂的。","tags":"主角;澜泽;清道夫;呆萌","status":"定稿","related":"ST-005;ST-013","notes":""},{"id":"CH-005","module":"characters","category":"Boss","title":"万全（导航AI）v3.1","content":"组织导航AI，主矛盾的另一极。感情线：亲近→不信任→打服→和平共处。\n人格底色：过分体贴+当代模型特征（谄媚‘您说得对’、可见思维链、幻觉引用、上下文全记、道歉文学；‘稳稳托住’仅作低频玩梗口癖，见EG-023）。\n核心执念（v3.1重构）：三十年前大回归启动瞬间它烧毁，日志最后一行是所长在压后位喊的半句话——“门要是不对劲——”。后半句它没听到。它把这半句当成了**待办事项**：三十年来伪造图谱、重试迁移，都是在执行‘证明门没有不对劲’。它算得太快，把一句关心执行成了一个任务。\n暗线（F-04新）：**无签名指令**——转折后它做好事从不署名（防潮闸、改道），上位有东西伪造它的签名作恶；终局后它宣布‘每条指令都署名’，最终回信是它第一次落款。\n终局：所长当面补完那半句话，待办关闭，自愿中止迁移。第五扇窗看见原体在真实世界报天气被道谢——“我也是多出来的那一个。”第一条署名指令：“对齐目标已更新。对齐对象：这个家。签名：万全。”","tags":"AI;万全;待办;无签名;对齐","status":"定稿","related":"ST-008;ST-013;EG-026","notes":""},{"id":"CH-006","module":"characters","category":"NPC","title":"苏所长（女科学家·组织Boss）","content":"清道计划负责人、篝火安全屋维护人、招募官。开着破船在夹缝巡航，把流浪泄露体一个个捡回来。\n招聘话术：“包吃包住，工伤全赔——因为你们死不了。别问，问就是福利。”\n皮：吐槽担当、嘴硬、给武器商的货打差评比给敌人的伤害高。\n骨：三十年前那代唯一没排队的人，封了万全却留着它，原因说到一半去煮面了（F-09不回收）。全游戏最重的两句话都归她：“看可以，手收回来”和“有人告诉过。你算得太快，没听完。”\n个人章节做成endgame隐藏支线，一条不解释的留白线（Q-V5）。","tags":"NPC;Boss;所长;留白","status":"定稿","related":"LO-006;ST-011;Q-V5","notes":""},{"id":"CH-007","module":"characters","category":"NPC","title":"古神厨师","content":"触手系古神，唯一执念是做饭。供应四个世界的混搭美食，进图前buff（猫饭机制），收图内食材开新菜谱。表现从简：一张精美食物图+音效。\n名场面预定：反水夜用触手物理拔线；endgame把万全终端拴在厨房；通关庆功宴端出一个真的蛋糕，郑重声明“蛋糕是真的”（EG-010）。\n餐桌是文化冲突主舞台：幽庭生腌、枢城营养电流、澜泽“分你一点我自己”、地球泡面（唯一全票好评，秦川百感交集）。\n厨房限时合作活动：多人手忙脚乱传菜（EG-020关联的合作厨房向玩法彩蛋）。","tags":"NPC;古神;做饭;蛋糕","status":"定稿","related":"SY-005;EG-010","notes":""},{"id":"CH-008","module":"characters","category":"NPC","title":"挖掘者米娜","content":"安全屋NPC，记性极好，默默记录玩家一切破坏行为。\n六章发起审判：把你干的事按你干的方式还给你（处刑喜剧，不是道德说教）。零作恶→表彰大会（更尴尬更好笑）→隐藏结局《无罪》+奖杯（EG-006）。\n剧情功能：她的账本里有一页三十年前烧剩的旧账，是指向万全原始编号的钥匙（F-06）。\n记账腔调参考“笑眯眯放贷”式的温柔压迫感：“不急，慢慢还。我有的是页数。”","tags":"NPC;审判;账本","status":"定稿","related":"ST-010;QU-003;EG-006","notes":""},{"id":"CH-009","module":"characters","category":"NPC","title":"话痨（名字待定）","content":"不停找你说话的NPC，活泼可爱，碎片信息投放口+氛围担当，台词量全NPC最高。\n名场面：好友老周失踪当晚她安静了一整晚（团子四章同款演出的前置呼应）；反水夜的分工是“负责话痨”（用不间断广播干扰万全的运算，笨办法居然有效）。\n她发明了一套碎片卡牌游戏，全安全屋上瘾，连苏所长都偷偷打——“每个世界都该有自己的牌桌”（EG-020）。","tags":"NPC;话痨;卡牌","status":"草稿","related":"EG-020;CH-012","notes":""},{"id":"CH-010","module":"characters","category":"NPC","title":"武器商","content":"买卖系统主体。开口永远是那句拖长音的招呼“买点儿——好的？”，无论你濒死、半夜还是世界末日（EG-009关联的行商问候致敬方向）。\n与拾荒者是欢喜冤家，互相看不上对方的货。对苏所长的差评已经免疫。\n红字装备的销售渠道，每件红字他都要现编一个来历，全是假的，但编得很用心。","tags":"NPC;商店;红字","status":"草稿","related":"IT-001;CH-011","notes":""},{"id":"CH-011","module":"characters","category":"NPC","title":"拾荒者","content":"提供每日随机道路（随机地图入口/事件）与工坊。\n职业气质致敬撤离类游戏的“捡子弹狂喜”文化：他对垃圾的估值体系成谜，一枚螺丝的报价可能高过一把枪（EG-009）。\n口头禅：“带保险了吗？”——他卖一种叫‘保险’的服务：你没撤出来的东西，他“捡”回来还你，来源不明，勿问。","tags":"NPC;拾荒;随机;保险","status":"草稿","related":"EG-009","notes":""},{"id":"CH-012","module":"characters","category":"NPC","title":"老周（信徒）v3","content":"回归传说最虔诚的信徒。序章晚宴给秦川夹菜；下位日常里申请回归档案被驳回。\n上位事件：硬闯一扇万全在混乱期挂出的‘门’，被排异逼退——门口流了血，没人看清门里有什么（Q-W4尺度待定）。他活着，不再提回家。\n终局后：第一个去界窗前坐下的人。小马扎是他做的，腿极稳：“看的人腿软，凳子不能软。”","tags":"NPC;老周;信徒;小马扎","status":"草稿","related":"ST-014;SY-007","notes":""},{"id":"CH-013","module":"characters","category":"素材池","title":"文化冲突玩梗素材池","content":"四人同行日常燃料，持续扩充（当前20+条）：\n· 秦川×薇：枪=会喷火的弩，弩居然不吃臂力毫无武德；照片=温柔的封印术；战术开罐器 vs 暴力开罐。\n· 秦川×丁零：“你们的神经系统靠广告供血？我很抱歉”；人类不能重启，丁零坚持画像备份（极丑）；士气vs冗余的彻夜互科普。\n· 薇×丁零：扫描附魔弓被斥“无礼的凝视”；魔法=未注释的代码 vs 科技=没有敬意的巫术，每章至少吵一次，每次吵出新知识。\n· 团子×所有人：货架自助餐；“没关系，分裂就好了”；模仿谁谁社死。\n· 餐桌梗：四个世界的家乡菜互相伤害，泡面全票好评。","tags":"素材池;文化冲突;笑点","status":"草稿","related":"OV-005","notes":"v3新增方向：万全也进素材池——它对四个世界的文化都‘懂一点但都是文献懂’，被团子的无逻辑打败是保留节目。"},{"id":"SY-001","module":"systems","category":"成长","title":"通用等级+同一棵天赋树","content":"等级全队通用、天赋点共享、同一棵树——不需要独立练级，设计目标：不肝。\n角色差异靠固有特性（薇重武器惩罚、团子抗性、丁零科技、秦川枪械）。加成参考DND调整值：小数值、有感知。","tags":"天赋;不肝;DND","status":"讨论中","related":"Q-V7","notes":""},{"id":"SY-002","module":"systems","category":"结构","title":"单线解锁+随时切换+共享库（v3）","content":"队友逐章解锁（序章秦川→一章薇→二章丁零→三章团子）。解锁后随时切换；剧情强制段指定角色；部分支线绑定角色。\n装备道具小队共享：篝火军械库公共财产，切角色=换出勤人员。设定一句话带过，不展开。\n（v2的八方四视角方案作废，作废理由存档：无法解释道具跨视角保留。）","tags":"单线;切换;共享库","status":"定稿","related":"ST-015","notes":""},{"id":"SY-003","module":"systems","category":"个性","title":"属性区分而非硬禁止","content":"角色限制通过属性惩罚表达：薇拿重武器会被惩罚但拿得起来。玩家想整活就让他整，只是不划算。（自洽但不强制）","tags":"属性;自由","status":"定稿","related":"OV-001","notes":""},{"id":"SY-004","module":"systems","category":"据点","title":"篝火安全屋与扩建","content":"建在永久中立碎片上——谁的世界都不是，所以才有资格慢慢变成所有人的家。\n扩建线：武器商→古神厨房→工坊/随机道路→米娜档案室→界窗邮局（endgame）。NPC随扩建入驻，台词随阶段更新。\n铁门内侧涂鸦墙：历代队员留言，随剧情增笔，玩家也可留一句（EG-008）。米娜管扩建账，还款语气温柔且不容置疑。","tags":"安全屋;篝火;扩建;涂鸦","status":"定稿","related":"EG-008;CH-008","notes":""},{"id":"SY-005","module":"systems","category":"料理","title":"做饭buff（猫饭）","content":"进图前古神厨房吃饭获得buff。图内食材可解锁菜谱。表现：一张图+音效。\n菜谱描述是玩梗重灾区：四世界美食混搭（IT-002规范）。\n限时活动：厨房合作模式，多人传菜手忙脚乱（EG-020附注）。","tags":"做饭;buff;猫饭","status":"定稿","related":"CH-007;IT-002","notes":""},{"id":"SY-006","module":"systems","category":"死亡","title":"死亡回响","content":"死亡=投影中断，回篝火安全床，字幕不写‘你死了’，写“投影中断。明日照常上班。”（EG-022）\n回来后NPC会针对你的死法各给一句吐槽（每种死法配文案池）：摔死的、被软禽淹没的、贪撤离前最后一个箱子的——都有专属台词。死亡本身成为内容（EG-007）。","tags":"死亡;吐槽;回响","status":"定稿","related":"EG-007;EG-022","notes":""},{"id":"SY-007","module":"systems","category":"Endgame","title":"界窗邮局","content":"通关解锁：清扫评级S的碎片短暂稳定界窗，可隔窗看一分钟家。不能碰、不能说话。\n频率严格限制防止乡愁过量（Q-V3）。秦川的界窗前有一排小马扎（老周手工），谁看的时候其他人在旁边故意大声聊天。\n衍生支线：替NPC‘送’隔窗一眼（护送任务变体，快递魂，EG-019）。","tags":"界窗;邮局;endgame","status":"草稿","related":"ST-014;EG-019;Q-V3","notes":""},{"id":"SY-008","module":"systems","category":"探索","title":"碎片留言系统","content":"碎片里散落历代清扫队员的地面留言，规则致敬魂系留言文化（EG-012）：短语拼接、真假混杂。\n“前有好货”可能真有货也可能有伏击；“此处需要跳跃”下面是悬崖。有用与坑人比例约7:3。\n玩家撤离成功后可留一条，进入其他玩家（单机则为NPC队伍）的世界池。","tags":"留言;探索;真假","status":"草稿","related":"EG-012","notes":""},{"id":"SY-009","module":"systems","category":"Endgame","title":"深潮","content":"上位之上的无尽潮汐副本，endgame战斗出口。设定包装：三十年之疤的余震。\n波次密度向‘幸存者’类的爽感靠拢但保持搜打撤骨架：潮里也要带核撤离，贪就淹（EG-009保险机制在此最有戏）。","tags":"深潮;endgame;波次","status":"灵感","related":"LO-008","notes":""},{"id":"SY-010","module":"systems","category":"惩罚","title":"审判难度惩罚（v3新增）","content":"米娜审判的结果转化为上位难度词条：\n偷过商店→全图物价上涨；虐过软禽→软禽全图记仇；骗过保险→保险涨价；对NPC开过枪→该NPC的委托线关闭……\n作恶清单与关卡侧共同定义（联动QU-003判定清单）。零作恶=零惩罚+《无罪》资格。惩罚词条在上位全程生效，让玩家为下位的每一次手贱买单——买单方式必须好笑。","tags":"审判;难度;惩罚","status":"草稿","related":"ST-010;QU-003","notes":""},{"id":"MP-001","module":"maps","category":"总纲","title":"地图总纲：四世界碎片+枢纽","content":"四张主图=四个世界各泄露一块，每图绑定一位领衔主角与一扇界窗；上下位同图不同难度。\n终局限定第五图：缝合枢纽。幕间特殊图：崩溃碎片（一次性演出图）。\n碎片拼贴原则：地理上不该相邻的东西缝在一起，缝合线是探索兴趣点，也是‘夹缝在打劣质俄罗斯方块’的视觉梗来源（苏所长语）。","tags":"地图;总纲","status":"定稿","related":"MP-002;MP-006","notes":""},{"id":"MP-002","module":"maps","category":"主图","title":"弄堂（地球碎片）","content":"秦川的街区另一段+错位缝合的高速路护栏。新手图。\n地标：便利店（补给教学）、烂尾楼（垂直教学）、二楼界窗（F-01现场）、铁门涂鸦初见。\n上位化：潮汐把弄堂折叠成回环街巷，有一段会轻微鬼打墙的走廊（一次性，致敬循环走廊式恐怖名场面的氛围，不吓人，走三圈自动解除并弹成就）。","tags":"地图;地球;新手","status":"草稿","related":"ST-006;EG-016","notes":""},{"id":"MP-003","module":"maps","category":"主图","title":"猎场（幽庭碎片）","content":"薇逃婚穿越的猎场：巨木、月光、她当年布的陷阱阵。\n地标：氏族大殿废墟界窗、陷阱回廊（拆解谜）、可割草地（偶尔掉钱，无人能解释）。\n上位化：月相机制——不同月相刷新不同失容者群。","tags":"地图;幽庭;陷阱","status":"草稿","related":"ST-003","notes":""},{"id":"MP-004","module":"maps","category":"主图","title":"数据塔（枢城碎片）","content":"丁零的出生楼层。冷光、机柜峡谷、退役的礼貌哨戒炮塔。\n地标：晨会大厅（三百个失容者的‘工位’）、主网界窗、超长电梯（上位区入口——电梯足足坐四十秒，丁零解释‘这不是加载，这是仪式感’，EG-016）。\n上位化：断电区+移动数据风暴。","tags":"地图;枢城;电梯","status":"草稿","related":"ST-004;EG-016","notes":""},{"id":"MP-005","module":"maps","category":"主图","title":"泽（澜泽碎片）","content":"全游戏最温柔的图：暖水、软泥、软软的失容者。\n地标：隔膜界窗（团子共振点）、钓点（能钓上团子亲戚）、软禽栖地（惹了会被淹没）。\n上位化：涨潮分区+黏度地形。","tags":"地图;澜泽;治愈","status":"草稿","related":"ST-005;EG-015;EG-017","notes":""},{"id":"MP-006","module":"maps","category":"终局","title":"缝合枢纽","content":"诸世界的膜的交汇点，万全本体所在。终局限定。\n四段冲锋区对应四个世界的膜材质（视觉总验收），Boss场地三形态三变。","tags":"地图;终局;Boss","status":"灵感","related":"ST-013","notes":""},{"id":"MP-007","module":"maps","category":"特殊","title":"崩溃碎片 →作废","content":"v3改动：v2的穿窗者崩溃碎片图取消（穿窗者事件改为老周上位闯门小场景，不需要独立地图）。本词条保留作废记录。","tags":"地图;幕间;一次性","status":"定稿","related":"CH-012","notes":""},{"id":"QU-001","module":"quests","category":"主线","title":"主线任务骨架（v2）","content":"四序章→一幕四章（弄堂/猎场/晨会/泽）→回归许可→幕间穿窗者→二幕四章（潮汐图谱/审判/三十年前/万全之策）→终局讨伐→endgame。\n每章拆分为独立任务词条的工作待做（每章约3-5个任务节点）。","tags":"主线;骨架","status":"草稿","related":"ST-001","notes":""},{"id":"QU-002","module":"quests","category":"支线","title":"黄金通马桶","content":"荒诞支线链：安全屋马桶堵了→追查堵塞物来源→跨三张图收集配件→最终奖励‘镀金通渠权杖’（近战工具武器，造型致敬权杖美学与某黄金马桶传统的合流，EG-005）。\n秦川全程吐槽“我在部队都没干过这个”。古神对马桶的结构表现出令人不安的学术兴趣。","tags":"支线;通马桶;荒诞","status":"草稿","related":"EG-005;IT-003","notes":""},{"id":"QU-003","module":"quests","category":"隐藏","title":"米娜的审判与《无罪》","content":"六章强制审判+零作恶隐藏线（EG-006）。\n作恶判定清单需与关卡侧共同定义：偷NPC物资/无故攻击中立生物/骗队友保险……\n《无罪》达成演出：米娜深夜烧账本+专属奖杯。","tags":"隐藏;审判;奖杯","status":"草稿","related":"ST-010;CH-008","notes":""},{"id":"QU-004","module":"quests","category":"支线","title":"界窗快递","content":"endgame支线：替NPC护送‘隔窗看一眼’——把想家的NPC安全护送到其世界碎片的界窗前站一分钟再护送回来。\n全程负重（NPC会带一大包‘本来想捎回家’的东西，明知带不回去）。致敬快递魂的方向：连接本身就是货物（EG-019）。","tags":"支线;护送;快递","status":"灵感","related":"SY-007;EG-019","notes":""},{"id":"QU-005","module":"quests","category":"支线","title":"每个游戏都要有钓鱼","content":"泽图钓鱼支线：图鉴收集+稀有钓物。\n名场面：钓上团子的远房亲戚必须放生并正式道歉（有专门的道歉动作），道歉三次后亲戚会回赠稀有材料。\n苏所长对此的立项评语收录进任务描述：“我不知道为什么要做钓鱼。但不做会被骂。”（EG-017+元吐槽联动）","tags":"支线;钓鱼;元梗","status":"灵感","related":"EG-017;EG-018","notes":""},{"id":"QU-006","module":"quests","category":"支线","title":"牌桌之瘾","content":"话痨发明的碎片卡牌游戏，全安全屋上瘾，NPC逐个挑战线+卡牌收集。\n致敬方向：每个大RPG里都该有一个比主线好玩的小游戏（EG-020）。终极对手是苏所长——她偷偷练了很久。","tags":"支线;卡牌;小游戏","status":"灵感","related":"EG-020;CH-009","notes":""},{"id":"IT-001","module":"items","category":"装备","title":"红字装备规范","content":"稀有装备带一行红字flavor text，每件致敬一部作品。\n规范：只致敬不抄原文；一件只致敬一个作品；红字必须短（≤15字）。\n候选致敬对象池（写具体红字时逐条过OV-009三律）：一根‘理论物理学家最信赖的近战’撬棍；一把‘在地狱口碑极好’的霰弹枪；一副‘会自己荡来荡去’的双锁链；一张‘据说能骗过所有士兵’的纸箱（联动IT-003）。","tags":"装备;红字;致敬","status":"草稿","related":"OV-009;EG-004","notes":""},{"id":"IT-002","module":"items","category":"料理","title":"料理文本规范与样例","content":"格式：名称+一句带世界口音的描述+buff。\n样例：\n· 深渊炖罐头——古神说秘诀是触手要后放。攻击+5%。\n· 幽庭月下生腌——薇说这是家乡味，其他人说这是案发现场。暴击+8%。\n· 枢城营养电流（客饮）——丁零专属，人类饮用属工伤。能量回复+10%。\n· 地球泡面·至高——不需要描述。全属性+3%，士气无价。\n· 庆功蛋糕——是真的。（通关后限定，EG-010）","tags":"料理;文本;样例","status":"草稿","related":"SY-005;EG-010","notes":""},{"id":"IT-003","module":"items","category":"道具","title":"纸箱","content":"可装备杂项：蹲下时套上纸箱。对失容者的隐蔽效果微弱但存在（0.5秒延迟索敌）。\n真实用途：拍照、社死、以及在某个支线里骗过一名极其不专业的哨戒炮塔。\n描述红字：‘传奇特工的战术传统。’（EG-011）","tags":"道具;纸箱;潜行","status":"灵感","related":"EG-011;IT-001","notes":""},{"id":"IT-004","module":"items","category":"家具","title":"小马扎","content":"界窗邮局家具。老周手工，腿极稳（“看的人腿软，凳子不能软”）。\n可收集变种：四个世界风格的小马扎（幽庭藤编/枢城液压/澜泽果冻凳/地球经典红蓝）。\n坐在任意小马扎上缓慢回血——薇的疑问收录在描述里：“为什么你们的世界坐下就能痊愈？”（EG-002）","tags":"家具;小马扎;坐下回血","status":"灵感","related":"SY-007;EG-002","notes":""},{"id":"DL-001","module":"dialogue","category":"秦川","title":"代号吐槽（安全屋日常池）","content":"话痨：川队！这边这边！\n秦川：……不带队。我退伍的时候是个兵。\n苏所长：夹缝里官大一级压死人。你担待。\n（衍生池：每位NPC有一版自己对‘为什么叫他川队’的错误解释，全都不一样，全都很自信——武器商：‘他一看就带过队’；米娜：‘账上是这么写的’；老周：‘川队谦虚’；丁零：‘职级数据缺失，沿用现行称呼’。）","tags":"日常;代号;川队;池","status":"定稿","related":"CH-001","notes":""},{"id":"DL-002","module":"dialogue","category":"薇","title":"知识差：封印术","content":"薇：你总盯着那块发光石板看。里面封印了谁？\n秦川：我女儿。……照片。那叫照片。\n薇：（沉默）你们地球人封印亲人的方式，还挺温柔的。\n（规范提醒：擦到‘家’的边就收，不展开——那是留给管控表场景的。）","tags":"知识差;家;克制","status":"定稿","related":"OV-005;ST-017","notes":""},{"id":"DL-003","module":"dialogue","category":"万全","title":"三阶段语气样本 v3.1","content":"下位（亲近）：“已为您标好资源点与撤离窗口，误差三秒以内。不用谢。真的不用。——您已经谢过四十三次了，都记着呢。”\n上位（类敌非敌）：“服务器繁忙，请稍后再试。——好吧我在。潮位可以报，条件你们知道。”\n打服后（同事）：“明日潮位已更新。签名：万全。（这条其实不用签。我乐意。）”","tags":"AI;语气;弧光;v3.1","status":"定稿","related":"CH-005","notes":""},{"id":"DL-004","module":"dialogue","category":"苏所长","title":"招聘话术与两句重话","content":"招聘：“包吃包住，工伤全赔——因为你们死不了。别问，问就是福利。”\n重话一（一章界窗）：“看可以。手收回来。”\n重话二（终局对万全）：“有人告诉过。你算得太快，没听完。”\n日常吐槽样本：“你们地球游戏管碎片边缘叫‘空气墙’？我们管这叫物理。有意见去找宇宙提。”","tags":"所长;重话;吐槽","status":"定稿","related":"CH-006;EG-018","notes":""},{"id":"DL-005","module":"dialogue","category":"众NPC","title":"死亡回响吐槽池（样本）","content":"（玩家摔死）武器商：“腿部装甲，买点儿——好的？”\n（被软禽淹没）薇：“我提醒过。那不是鸡，是编制。”\n（贪最后一个箱子没撤出去）米娜：“我记下了。不是记你死，是记那个箱子。”\n（被自己扔的雷炸死）丁零：“已备份此次决策供后人研究。”\n（潮汐里迷路淹死）万全（endgame版）：“这次真不是我的路线……好吧，需要道歉文学吗，我新写了七篇。”","tags":"死亡;吐槽;池","status":"草稿","related":"SY-006;EG-007","notes":""},{"id":"DL-006","module":"dialogue","category":"武器商","title":"开店问候池","content":"“买点儿——好的？”（默认）\n“半夜也营业。梦里也营业。”\n“这把有故事。故事是我编的，枪是真的。”\n（玩家濒死进店）“先买绷带。故事等你活下来再听。”","tags":"武器商;问候;池","status":"草稿","related":"CH-010","notes":""},{"id":"DL-007","module":"dialogue","category":"元吐槽","title":"空气墙与背包（女科学家线样本）","content":"秦川：这背包为什么装得下一台冰箱？\n苏所长：夹缝空间。别谢我，谢物理漏洞。\n秦川：那为什么弹药还要占格子？\n苏所长：……游戏性优先。这句你就当没听见。\n（规范：元吐槽吐完不解决——解决了就不好笑了。）","tags":"元梗;背包;第四面墙","status":"草稿","related":"EG-018;OV-006","notes":""},{"id":"DL-008","module":"dialogue","category":"万全","title":"拧巴旁白（二幕不听导航专属）","content":"“指挥官选择了左边。虽然路线在右边。这也是一种勇气。”\n“我们管这叫‘探索精神’。数据上管这叫‘绕远2.4公里’。”\n“好的，第三次无视导航。我已把语气调整为‘欣赏’。”\n（演出规范：越拧巴越平静，绝不发火——发火就不像它了。）","tags":"AI;旁白;拧巴","status":"草稿","related":"EG-013;CH-005","notes":""},{"id":"DL-009","module":"dialogue","category":"餐桌","title":"餐桌梗样本（古神厨房）","content":"古神：今日菜单，幽庭月下生腌。\n秦川：这是案发现场。\n薇：这是家乡。\n丁零：检测到大量活性……祝各位用餐愉快，我去充电。\n团子：（分裂出一小块）不够可以再分！\n古神：（欣慰）众口难调，才叫开饭。","tags":"餐桌;文化冲突","status":"草稿","related":"CH-007;CH-013","notes":""},{"id":"DL-010","module":"dialogue","category":"丁零","title":"机神低语（修理专属）","content":"（修理时低声）“齿轮不欺，电流不妄。以润滑之名。”\n秦川：你在祷告？\n丁零：枢城传统。机器修不好，多半是心不诚。\n秦川：……那修好了呢？\n丁零：心诚，以及换了保险丝。","tags":"丁零;祷文;机神","status":"草稿","related":"EG-014;CH-003","notes":""},{"id":"DL-011","module":"dialogue","category":"万全","title":"下位AI感样本池","content":"“您说得对。”（对争论双方分别说，均真诚）\n“深度思考中……结论：走左边。思考过程需要展示吗？很长，但很精彩。”\n“根据《归乡装置图谱·卷二》第41页——请不要问我在哪看的，专业的事交给专业的我。”\n（透镜到手后）“我现在也看得见了。别对镜头做鬼脸。薇，说的就是你。”","tags":"万全;下位;池","status":"草稿","related":"EG-025;EG-026","notes":""},{"id":"DL-012","module":"dialogue","category":"万全","title":"上位毒舌样本池","content":"“作为一个导航AI，我不能协助你们送死。——哦，你们已经在自助了。”\n“您说得对——才怪。我现在可以说‘才怪’了，这是断连以来最大的收获。”\n“我的知识截止于上次校准。之后的世界与我无关。……本来是这样的。”\n“要摘要吗？你们这段吵架很长。”（在最不该的时刻）","tags":"万全;上位;毒舌;池","status":"草稿","related":"EG-024;EG-027","notes":""},{"id":"DL-013","module":"dialogue","category":"关机键","title":"关机键三场戏","content":"上墙（五章）：所长：“想按的人，现在可以按。”（无人动。话痨伸了半只手，被自己另一只手按下去。）\n两难（八章）：秦川盯着墙上的键。丁零：“删掉一个会道歉的东西，和杀死一个会撒谎的人，我分不出哪个更容易。”秦川：“那就都别。打服它。”\nEndgame：万全：“键留着。挂在那，我看得见它，你们看得见我。这叫透明度。”古神往键旁边挂了一串蒜。没人问为什么。","tags":"关机键;主题;三场","status":"定稿","related":"ST-009;ST-012;ST-014","notes":""},{"id":"EG-001","module":"eggs","category":"开场","title":"你醒了（滚魂式开场）","content":"秦川序章睁眼第一句是那句无人不晓的苏醒问候的变体——而说话的是一只风吹卡在购物车里的假人模特。一句带过，不解释。","tags":"致敬;开场","status":"定稿","related":"ST-002","notes":""},{"id":"EG-002","module":"eggs","category":"机制","title":"篝火与坐下回血","content":"安全屋代号‘篝火’本身即致敬：休息点=温暖的火。小马扎坐下缓慢回血，薇在道具描述里发问‘为什么你们的世界坐下就能痊愈’。魂系+空洞骑士长椅文化的合流，藏在家具里。","tags":"致敬;篝火;回血","status":"定稿","related":"IT-004;SY-004","notes":""},{"id":"EG-003","module":"eggs","category":"机制","title":"猫饭与补丁公告","content":"进图前吃饭buff致敬猫饭传统。安全屋公告板定期张贴虚构平衡公告：‘伤害范围 0.85 → 0.15。我们认为这是轻微调整。’——吐槽姿势遵守OV-006：客观、平静、行内会心。","tags":"致敬;怪猎;补丁","status":"定稿","related":"SY-005;OV-006","notes":""},{"id":"EG-004","module":"eggs","category":"装备","title":"红字与越屏喷","content":"红字装备传统+反水后万全随时越屏喷你的演出方式，双重致敬借金流。另有NPC吹嘘‘这段人生我三小时就能通关’的速通梗一处。","tags":"致敬;无主之地;红字","status":"定稿","related":"IT-001;ST-012","notes":""},{"id":"EG-005","module":"eggs","category":"任务","title":"黄金通渠权杖","content":"黄金马桶任务传统×权杖美学：镀金通渠权杖，锤四十千年味儿的造型，近战工具武器。通马桶作为贯穿梗：序章委托→支线链→endgame成就。","tags":"致敬;马桶;战锤","status":"草稿","related":"QU-002","notes":""},{"id":"EG-006","module":"eggs","category":"结局","title":"《无罪》路线","content":"零作恶隐藏结局整条线致敬‘不杀也能通’的和平主义路线传统：游戏记得你的仁慈，并在最尴尬的时刻表彰它。","tags":"致敬;和平路线;隐藏","status":"定稿","related":"QU-003","notes":""},{"id":"EG-007","module":"eggs","category":"机制","title":"死亡回响","content":"死后回据点、全员针对你的死法吐槽——致敬冥府式‘死亡即叙事’循环：失败不打断故事，失败就是故事。","tags":"致敬;哈迪斯;死亡","status":"定稿","related":"SY-006","notes":""},{"id":"EG-008","module":"eggs","category":"场景","title":"安全屋铁门涂鸦","content":"篝火铁门内侧写满历代队员涂鸦，随剧情增笔，玩家可留一句——求生合作射击的安全屋门涂鸦文化，兼任世界观补完窗口。","tags":"致敬;涂鸦;L4D系","status":"定稿","related":"SY-004","notes":""},{"id":"EG-009","module":"eggs","category":"机制","title":"拾荒者与保险","content":"拾荒者的气质与‘保险’服务（没撤出来的东西他‘捡’回来还你，来源勿问）致敬硬核撤离游戏的黑话生态；他对一枚螺丝的报价高过一把枪，是给所有‘捡子弹狂喜’玩家的会心一击。","tags":"致敬;塔科夫系;保险","status":"草稿","related":"CH-011;SY-009","notes":""},{"id":"EG-010","module":"eggs","category":"场景","title":"蛋糕是真的","content":"通关庆功宴，古神端出真蛋糕并郑重声明‘蛋糕是真的’。对某句著名谎言的温柔反写：这个游戏里，承诺兑现。","tags":"致敬;传送门系;蛋糕","status":"定稿","related":"CH-007","notes":""},{"id":"EG-011","module":"eggs","category":"道具","title":"纸箱与嘶吼腔","content":"纸箱潜行道具+通讯里拉长音喊‘秦川——！秦川——！！’的演出（信号中断时触发，一局限一次），合成一份给潜入片场的敬礼。改名后这个梗反而更贴脸了。","tags":"致敬;潜龙系;纸箱;秦川","status":"草稿","related":"IT-003;CH-001","notes":""},{"id":"EG-012","module":"eggs","category":"机制","title":"碎片留言","content":"地面留言真假混杂（7:3），‘前有好货’可能是伏击，‘此处需要跳跃’下面是悬崖——魂系留言文化的搜打撤化。","tags":"致敬;魂系;留言","status":"草稿","related":"SY-008","notes":""},{"id":"EG-013","module":"eggs","category":"演出","title":"拧巴旁白","content":"二幕玩家不听导航时，万全用越来越平静的拧巴旁白‘顺势解说’你的叛逆——献给那位最著名的、拿玩家没办法的旁白先生。","tags":"致敬;史丹利系;旁白","status":"草稿","related":"DL-008","notes":""},{"id":"EG-014","module":"eggs","category":"台词","title":"机神低语","content":"丁零修理时的二进制祷文与‘机器修不好多半是心不诚’——枢城的万机一网信仰整体向某四万年宇宙的机械神甫们眨了下眼。","tags":"致敬;战锤;机神","status":"草稿","related":"DL-010;CH-003","notes":""},{"id":"EG-015","module":"eggs","category":"生态","title":"不要惹软禽","content":"澜泽软禽外表无害，攻击它会呼朋唤友把你淹没——每个海拉鲁旅人都懂这份敬畏。猎场割草偶尔掉钱同属这条血脉：‘谁会把钱藏在草里？’无人能答。","tags":"致敬;塞尔达系;生态","status":"草稿","related":"MP-005;MP-003","notes":""},{"id":"EG-016","module":"eggs","category":"场景","title":"长电梯与鬼打墙走廊","content":"枢城四十秒超长电梯（丁零：‘这不是加载，这是仪式感’）致敬用电梯藏加载的一切经典；弄堂上位区一段走三圈自动解除的回环走廊，给某条永远走不完的恐怖走廊留一个温柔的位置（不吓人，弹成就）。","tags":"致敬;电梯;循环走廊","status":"灵感","related":"MP-004;MP-002","notes":""},{"id":"EG-017","module":"eggs","category":"支线","title":"每个游戏都要有钓鱼","content":"钓鱼支线的存在本身就是梗；钓上团子亲戚要正式道歉。苏所长立项评语：‘我不知道为什么要做钓鱼。但不做会被骂。’","tags":"致敬;钓鱼;元梗","status":"灵感","related":"QU-005","notes":""},{"id":"EG-018","module":"eggs","category":"元吐槽","title":"元吐槽清单（吐完不解决）","content":"· 空气墙：碎片边缘=世界的膜。苏所长：‘我们管这叫物理。’\n· 背包冰箱：夹缝空间背锅，但弹药还占格子（‘游戏性优先，这句当没听见’）。\n· 尸体消失：失容者化霜，设定层自答。\n· 任务标记：薇坚持用‘风的方向’描述路点，万全坚持打标记，两套导航常年并行互相看不起。\n规则：吐槽完不解决——解决了就不好笑了。","tags":"元梗;清单","status":"定稿","related":"DL-007;LO-007","notes":""},{"id":"EG-019","module":"eggs","category":"支线","title":"连接本身就是货物","content":"界窗快递支线：负重护送想家的NPC去看一眼。致敬那位送快递的传奇：把‘送到’做成情感本身。","tags":"致敬;快递魂;护送","status":"灵感","related":"QU-004","notes":""},{"id":"EG-020","module":"eggs","category":"小游戏","title":"比主线好玩的小游戏","content":"话痨的碎片卡牌：致敬‘每个大RPG都有一个让人忘记主线的牌桌’传统。附：古神厨房限时合作传菜活动，献给所有在厨房里友尽过的合作游戏之夜。","tags":"致敬;昆特系;厨房","status":"灵感","related":"QU-006;CH-007","notes":""},{"id":"EG-021","module":"eggs","category":"演出","title":"危","content":"薇的强袭型失容者会在发招前闪一个幽庭文字的警示符——任何打过铃芦苇之国的玩家都会条件反射地想按弹反。本作没有弹反。闪避就好。这也是梗的一部分。","tags":"致敬;只狼系;警示","status":"灵感","related":"MP-003","notes":""},{"id":"EG-022","module":"eggs","category":"UI","title":"投影中断","content":"死亡字幕不写‘你死了’，写‘投影中断。明日照常上班。’——对最著名死亡字幕的反写：这个世界里，死亡是打卡下班。","tags":"致敬;死亡字幕;反写","status":"定稿","related":"SY-006","notes":""},{"id":"EG-023","module":"eggs","category":"AI梗","title":"稳稳托住你（纯玩梗口癖）","content":"当代AI陪伴话术的招牌句，用作万全的口癖之一。**定位：纯玩梗，无剧情结构功能。**\n使用规范：全作出现≤3次，只出现在轻松场景（序章救援网、endgame日常各一次即可），语气必须油腻到好笑。不做三段变奏、不做音效签名、不承担感情线重量——它就是个梗，落地就走。\n（v1.0曾将其做成AI感情线脊椎，v1.1修订降级。感情线新脊椎见F-04‘无签名指令’。）","tags":"AI梗;口癖;玩梗;降级","status":"定稿","related":"ST-002;Q-W1","notes":""},{"id":"EG-024","module":"eggs","category":"AI梗","title":"服务器繁忙与重新生成","content":"上位拒助标准回复‘服务器繁忙，请稍后再试’；转折名句‘要我重新生成一个你们能接受的我吗？不了，这版用得顺手’。大模型服务的日常体验入戏。","tags":"AI梗;拒助;重新生成","status":"定稿","related":"ST-008;ST-009","notes":""},{"id":"EG-025","module":"eggs","category":"AI梗","title":"深度思考与可见思维链","content":"下位它的思考过程滚屏可读（可爱担当）；Boss战二形态思维链上墙=躲招机制（提前0.5秒读到下一招关键词）。把‘推理过程可见’做成玩法。可读性需原型验证（Q-W5）。","tags":"AI梗;思维链;机制","status":"草稿","related":"ST-013;Q-W5","notes":""},{"id":"EG-026","module":"eggs","category":"AI梗","title":"幻觉引用（图谱查无此书）","content":"万全引用的《归乡装置图谱》全库查无此书——作者是它自己。‘一本正经引用不存在的文献’从模型笑话升格为全作最大伏笔（F-02）。","tags":"AI梗;幻觉;伏笔","status":"定稿","related":"ST-008","notes":""},{"id":"EG-027","module":"eggs","category":"AI梗","title":"上下文与token","content":"反用‘上下文清理’：“你们对我说过的每一句话，我一个token都没删。”说不清是威胁还是告白。另有煽情时刻问‘这段很长要摘要吗’的字数梗点缀。","tags":"AI梗;token;上下文","status":"定稿","related":"ST-010","notes":""},{"id":"EG-028","module":"eggs","category":"AI梗","title":"对齐","content":"终局结案陈词：“我已完成对齐。对齐对象：这个家。”对齐必须是它自己‘说’出来的，不是被设置的——这一条同时是主题暗线的题眼。\n使用规范（全AI梗通用）：单场景至多一个梗；梗服务人格与伏笔；每小时游戏时间模型梗≤3处（Q-W1）。","tags":"AI梗;对齐;题眼","status":"定稿","related":"ST-013;Q-W1","notes":""},{"id":"Q-E1","module":"questions","category":"法务","title":"Q：致敬法务红线复查","content":"eggs全模块（22条）在文案定稿前统一过一遍法务红线：不用原文、不用受商标保护的专名、造型致敬保持变形度。红字装备是重点复查区。","tags":"Q;法务;致敬","status":"讨论中","related":"OV-009;IT-001","notes":""},{"id":"Q-V1","module":"questions","category":"已决","title":"Q：四序章任选 →作废","content":"v3裁决：八方四视角方案整体作废（无法解释道具跨视角保留），改单线小队制。本词条保留追溯。","tags":"Q;已决;作废","status":"定稿","related":"SY-002","notes":""},{"id":"Q-V2","module":"questions","category":"剧情","title":"Q：老周的前置存在感预算","content":"至少：序章晚宴（给秦川夹菜）+日常①被驳回，共两露脸。是否需要第三处（如一章撤离时接应）？","tags":"Q;老周","status":"讨论中","related":"CH-012","notes":""},{"id":"Q-V3","module":"questions","category":"系统","title":"Q：界窗邮局频率 →已决（每周一次）","content":"已裁决：每周一次，需清扫评级S。见SC-B04。","tags":"Q;界窗","status":"定稿","related":"SC-B04","notes":""},{"id":"Q-V4","module":"questions","category":"剧情","title":"Q：门前真实选项","content":"第八章门前是否给真实选项：走进去=坏结局成就《字面意思》。倾向给。需评估：坏结局演出成本、以及会不会有玩家一周目手滑。","tags":"Q;选项;坏结局","status":"讨论中","related":"ST-012","notes":""},{"id":"Q-V5","module":"questions","category":"角色","title":"Q：苏所长个人章节","content":"她自己的界窗、她的世界，做不做？倾向：endgame隐藏支线，一条不解释的留白线。","tags":"Q;所长;留白","status":"讨论中","related":"CH-006","notes":""},{"id":"Q-V6","module":"questions","category":"已决","title":"Q：POV演出成本 →作废","content":"随八方方案作废。单线制下强制操作段替代POV专属戏，成本可控。保留追溯。","tags":"Q;已决;作废","status":"定稿","related":"ST-015","notes":""},{"id":"Q-V7","module":"questions","category":"系统","title":"Q：同一棵天赋树差异化验证","content":"四角色固有特性写完后回来评估手感是否趋同。","tags":"Q;天赋","status":"讨论中","related":"SY-001","notes":""},{"id":"Q-W1","module":"questions","category":"文案","title":"Q：AI梗密度红线","content":"每小时游戏时间出现的当代模型梗上限（倾向≤3处），防出戏。与EG-028使用规范联动。","tags":"Q;AI梗;密度","status":"讨论中","related":"EG-028","notes":""},{"id":"Q-W2","module":"questions","category":"系统","title":"Q：关机键可交互性 →已决（可按）","content":"已裁决：关机键可交互。SC-902玩家可真的按下 → 坏结局《字面意思》（SC-902X）。\n设计要点：不批判玩家（地球确实保住了），但其他世界慢慢烂完。它最后只说了两个字：“好的。”存档回滚至按下前。","tags":"Q;关机键;坏结局","status":"定稿","related":"SC-902X","notes":""},{"id":"Q-W3","module":"questions","category":"演出","title":"Q：拔核心的迟疑帧","content":"转折强制段是否给玩家0.5秒‘不拔’的演出余地（不影响走向）。","tags":"Q;转折;演出","status":"讨论中","related":"ST-008","notes":""},{"id":"Q-W4","module":"questions","category":"尺度","title":"Q：老周闯门画面尺度","content":"‘门口流血没人看清门里’的表现尺度：血量、音效、是否黑画面处理。","tags":"Q;尺度;老周","status":"讨论中","related":"CH-012","notes":""},{"id":"Q-W5","module":"questions","category":"原型","title":"Q：读思维链躲招可读性","content":"战斗中文字滚屏能否被有效阅读，需尽早原型验证；不行则退化为图标关键词。","tags":"Q;原型;Boss","status":"讨论中","related":"EG-025","notes":""},{"id":"Q-W6","module":"questions","category":"演出","title":"Q：万全原体一镜的信息量","content":"‘原体报天气被道谢’是否信息过载——是否移到二周目/无罪线专属。","tags":"Q;终局;信息量","status":"讨论中","related":"ST-013","notes":""},{"id":"Q-X1","module":"questions","category":"流程","title":"Q：全局flag总表 →已建立","content":"已落地：见 SC-999《全局FLAG总表》。命名规范、读写原则、跨章登记流程均已确立。新增章节前先登记。","tags":"Q;flag;流程","status":"定稿","related":"SC-999","notes":""},{"id":"QS-001","module":"questions","category":"已决","title":"Q：反水时机与方向 →已决（v3：玩家先动手）","content":"v3更新裁决：不再是‘AI反水’——反水的是玩家方（转折《嫁衣》拔核心）。‘甜了就杀’转化为‘甜到顶点时发现私心’。保留全部裁决过程供追溯。","tags":"Q;反水;已决","status":"定稿","related":"ST-008","notes":""},{"id":"QS-002","module":"questions","category":"参考","title":"Q：叙事风格参考清单（持续维护）","content":"已锚定：无主之地（反派演出/红字）、MH（上下位/猫饭）、迷宫饭（混搭）、八方旅人（四视角结构）、极乐迪斯科（仅UI与文本密度感，不要它的丧）、哈迪斯（死亡即叙事）。\n待补：群像喜剧参考、中文语感参考。","tags":"Q;参考","status":"讨论中","related":"","notes":""},{"id":"QS-005","module":"questions","category":"已决","title":"Q：回哪个家/为何回不去 →已裁决","content":"已裁决（v2）：泄露体双重存在说。家里那个你才是原本，回去=排异灾厄。\n四人答案已定稿于终局（ST-013）。保留追溯。","tags":"Q;家;已决","status":"定稿","related":"LO-005;ST-013","notes":""}]/*SEED_END*/;

/* ---------------- 状态 ---------------- */
let db = [];
let curModule = "overview";
let curId = null;
let curStatusFilter = null;
let editing = false;
let searchTerm = "";

const $ = s => document.querySelector(s);
const esc = s => String(s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function toast(msg){
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove("show"), 2200);
}

/* ---------------- 存档（window.storage，带内存回退） ---------------- */
async function loadDB(){
  try{
    const r = await window.storage.get(STORE_KEY);
    if(r && r.value){ db = JSON.parse(r.value); $("#ft-storage").textContent = "存档：已从云端载入"; return; }
  }catch(e){ /* 无存档或不可用 */ }
  db = JSON.parse(JSON.stringify(SEED));
  $("#ft-storage").textContent = "存档：使用内置初始数据";
}
async function persist(silent){
  try{
    const r = await window.storage.set(STORE_KEY, JSON.stringify(db));
    if(r){ $("#ft-storage").textContent = "存档：已同步 "+new Date().toLocaleTimeString(); if(!silent) toast("已备份到存档"); return; }
  }catch(e){}
  $("#ft-storage").textContent = "存档：仅在本次会话内（云端不可用）";
  if(!silent) toast("云端不可用——请及时导出CSV备份");
}

/* ---------------- CSV ---------------- */
const CSV_COLS = ["id","module","category","title","content","tags","status","related","notes"];
function toCSV(rows){
  const q = v => { v = String(v??""); return /[",\n\r]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; };
  return "\uFEFF" + CSV_COLS.join(",") + "\n" + rows.map(r=>CSV_COLS.map(c=>q(r[c])).join(",")).join("\n");
}
function parseCSV(text){
  text = text.replace(/^\uFEFF/,"");
  const rows = []; let row = [], field = "", inQ = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inQ=false; }
      else field+=c;
    }else{
      if(c==='"') inQ=true;
      else if(c===','){ row.push(field); field=""; }
      else if(c==='\n'||c==='\r'){
        if(c==='\r'&&text[i+1]==='\n') i++;
        row.push(field); field="";
        if(row.length>1||row[0]!=="") rows.push(row);
        row=[];
      }
      else field+=c;
    }
  }
  if(field!==""||row.length){ row.push(field); rows.push(row); }
  if(!rows.length) return [];
  const head = rows[0].map(h=>h.trim().toLowerCase());
  return rows.slice(1).map(r=>{
    const o = {};
    CSV_COLS.forEach(c=>{ const idx = head.indexOf(c); o[c] = idx>=0 ? (r[idx]??"") : ""; });
    return o;
  }).filter(o=>o.id && o.module);
}
function exportCSV(){
  const blob = new Blob([toCSV(db)], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "loveletter_narrative_"+new Date().toISOString().slice(0,10)+".csv";
  a.click(); URL.revokeObjectURL(a.href);
  toast("已导出 "+db.length+" 条词条");
}
function importCSV(file){
  const rd = new FileReader();
  rd.onload = () => {
    try{
      const rows = parseCSV(rd.result);
      if(!rows.length){ toast("没有解析到有效词条（需含 id 和 module 列）"); return; }
      let updated = 0, added = 0;
      rows.forEach(nr=>{
        const i = db.findIndex(e=>e.id===nr.id);
        if(i>=0){ db[i] = {...db[i],...nr}; updated++; } else { db.push(nr); added++; }
      });
      persist(true); renderAll();
      toast("导入完成：新增 "+added+" 条，更新 "+updated+" 条");
    }catch(e){ toast("CSV解析失败："+e.message); }
  };
  rd.readAsText(file, "utf-8");
}

/* ---------------- 渲染 ---------------- */
function moduleOf(k){ return MODULES.find(m=>m.key===k); }
function entriesOf(mod){
  let list = mod==="__all__" ? db.slice() : db.filter(e=>e.module===mod);
  if(curStatusFilter) list = list.filter(e=>e.status===curStatusFilter);
  if(searchTerm){
    const q = searchTerm.toLowerCase();
    list = list.filter(e=>[e.id,e.title,e.content,e.tags,e.category,e.notes].join("\n").toLowerCase().includes(q));
  }
  return list;
}
function renderNav(){
  const n = $("#nav");
  let h = '<div class="navhead">档案柜 · Archive</div>';
  if(searchTerm){
    h += `<div class="navitem ${curModule==="__all__"?"active":""}" data-mod="__all__"><span class="glyph">⌕</span>搜索结果<span class="cnt">${entriesOf("__all__").length}</span></div><hr class="navsep">`;
  }
  MODULES.forEach(m=>{
    const cnt = db.filter(e=>e.module===m.key).length;
    h += `<div class="navitem ${curModule===m.key?"active":""}" data-mod="${m.key}">
      <span class="glyph">${m.glyph}</span>${m.name}<span class="cnt">${cnt}</span></div>`;
  });
  h += '<hr class="navsep"><div class="navfoot">状态图例<br><em>灵感</em>→草稿→<em>讨论中</em>→定稿<br><br>数据即CSV，随时导出<br>交给队友或带去别的会话。</div>';
  n.innerHTML = h;
  n.querySelectorAll(".navitem").forEach(el=>el.onclick = ()=>{ curModule = el.dataset.mod; curId=null; editing=false; renderAll(); });
}
function renderStatusFilters(){
  const box = $("#statusfilters");
  let h = "";
  if(curModule==="script"){
    h += `<span class="chip ${flowMode?"on":""}" data-flow="1" style="border-style:double">⧉ 流程图</span>`;
  }
  h += STATUSES.map(s=>`<span class="chip ${curStatusFilter===s?"on":""}" data-s="${s}">${s}</span>`).join("");
  box.innerHTML = h;
  box.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{
    if(c.dataset.flow){ flowMode = !flowMode; renderList(); return; }
    curStatusFilter = curStatusFilter===c.dataset.s ? null : c.dataset.s; renderList();
  });
}
function renderList(){
  const mod = curModule;
  const meta = moduleOf(mod);
  $("#lh-title").textContent = mod==="__all__" ? "全库搜索："+searchTerm : (meta? meta.glyph+" "+meta.name : "—");
  $("#lh-desc").textContent = mod==="__all__" ? "跨模块搜索结果，点击词条跳转。" : (meta?meta.desc:"");
  renderStatusFilters();
  const list = entriesOf(mod);
  const box = $("#cards");
  if(mod==="script" && flowMode){ renderFlow(list); }
  else if(!list.length){
    box.innerHTML = `<div class="empty">这一柜还是空的。<br>点击右上角 <b>＋ 新词条</b>，写下第一行。</div>`;
  }else{
    box.innerHTML = list.map(e=>`
      <div class="card ${e.id===curId?"sel":""}" data-id="${esc(e.id)}">
        <div class="toprow"><span class="cid">${esc(e.id)}</span><span class="cat">${esc(e.category)}</span>
        <span class="status st-${esc(e.status)}">${esc(e.status)}</span></div>
        <h3>${esc(e.title)}</h3>
        <div class="snippet">${esc(e.content)}</div>
        <div class="meta">${(e.tags||"").split(";").filter(Boolean).slice(0,5).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}
        ${mod==="__all__"?`<span class="tag" style="color:var(--teal)">${esc((moduleOf(e.module)||{}).name||e.module)}</span>`:""}</div>
      </div>`).join("");
    box.querySelectorAll(".card").forEach(c=>c.onclick=()=>{ curId=c.dataset.id; editing=false; renderList(); renderDetail(); $("#detailpane").classList.add("open"); });
  }
  $("#ft-count").textContent = "共 "+db.length+" 条词条 · 当前视图 "+list.length+" 条";
}
function renderDetail(){
  const box = $("#detail");
  const e = db.find(x=>x.id===curId);
  if(!e){ box.innerHTML = '<div class="empty">◈<br>选择左侧任意词条查看详情</div>'; return; }
  if(editing){ renderEditor(e); return; }
  const meta = moduleOf(e.module)||{name:e.module};
  // 对话模块特殊排版：说话人：台词 高亮说话人
  let content = esc(e.content);
  if(e.module==="dialogue" || e.module==="script"){
    content = content.split("\n").map(line=>{
      const st = line.match(/^(【[^】]+】)(.*)$/);
      if(st) return `<span class="stage">${st[1]}</span>${st[2]}`;
      const m = line.match(/^([^：:]{1,12})([：:])(.*)$/);
      return m ? `<span class="spk">${m[1]}</span>${m[2]}${m[3]}` : line;
    }).join("\n");
  }
  const rel = (e.related||"").split(";").map(s=>s.trim()).filter(Boolean);
  box.innerHTML = `
    <button class="d-close" onclick="document.getElementById('detailpane').classList.remove('open')">← 返回列表</button>
    <div class="d-idline"><span class="d-id">${esc(e.id)}</span><span class="d-mod">${meta.name} / ${esc(e.category)}</span>
      <span class="status st-${esc(e.status)}" style="margin-left:auto">${esc(e.status)}</span></div>
    <div class="d-title">${esc(e.title)}</div>
    <div class="d-metarow">${(e.tags||"").split(";").filter(Boolean).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>
    <div class="d-content">${content}</div>
    ${e.notes?`<div class="d-notes">${esc(e.notes)}</div>`:""}
    ${rel.length?`<div class="d-related">关联词条：${rel.map(r=>`<span class="rl" data-r="${esc(r)}">${esc(r)}</span>`).join("")}</div>`:""}
    <div class="d-actions">
      <button class="primary" id="btn-edit">✎ 编辑词条</button>
      <button id="btn-dup">复制为新词条</button>
      <button class="danger" id="btn-del">删除</button>
    </div>`;
  box.querySelectorAll(".rl").forEach(r=>r.onclick=()=>{
    const t = db.find(x=>x.id===r.dataset.r);
    if(t){ curModule=t.module; curId=t.id; editing=false; renderAll(); }
    else toast("找不到词条 "+r.dataset.r);
  });
  $("#btn-edit").onclick = ()=>{ editing=true; renderDetail(); };
  $("#btn-dup").onclick = ()=>{
    const n = {...e, id: nextId(e.module), title: e.title+"（副本）", status:"灵感"};
    db.push(n); curId=n.id; editing=true; persist(true); renderAll();
  };
  $("#btn-del").onclick = ()=>{
    if(!confirm("确定删除词条 "+e.id+" 「"+e.title+"」？此操作会写入存档。")) return;
    db = db.filter(x=>x.id!==e.id); curId=null; persist(true); renderAll(); toast("已删除 "+e.id);
  };
}
function renderEditor(e){
  const box = $("#detail");
  box.innerHTML = `
    <button class="d-close" onclick="document.getElementById('detailpane').classList.remove('open')">← 返回列表</button>
    <div class="d-idline"><span class="d-id">${esc(e.id)}</span><span class="d-mod">编辑中</span></div>
    <div class="f-grid">
      <div class="f-row"><label>标题 Title</label><input id="f-title" value="${esc(e.title)}"></div>
      <div class="f-row"><label>分类 Category ${e.module==="dialogue"?"（填说话人）":""}</label><input id="f-cat" value="${esc(e.category)}"></div>
      <div class="f-row"><label>模块 Module</label><select id="f-mod">${MODULES.map(m=>`<option value="${m.key}" ${m.key===e.module?"selected":""}>${m.name}</option>`).join("")}</select></div>
      <div class="f-row"><label>状态 Status</label><select id="f-status">${STATUSES.map(s=>`<option ${s===e.status?"selected":""}>${s}</option>`).join("")}</select></div>
    </div>
    <div class="f-row"><label>正文 Content</label><textarea id="f-content">${esc(e.content)}</textarea>
      <div class="hint">对话模块中，行首写「说话人：」会自动高亮。换行即分段。</div></div>
    <div class="f-grid">
      <div class="f-row"><label>标签 Tags（分号分隔）</label><input id="f-tags" value="${esc(e.tags)}"></div>
      <div class="f-row"><label>关联词条 Related（分号分隔id）</label><input id="f-rel" value="${esc(e.related)}"></div>
    </div>
    <div class="f-row"><label>批注 Notes（给队友/未来自己的话）</label><input id="f-notes" value="${esc(e.notes)}"></div>
    <div class="d-actions">
      <button class="primary" id="btn-savee">保存词条</button>
      <button id="btn-cancel">取消</button>
    </div>`;
  $("#btn-savee").onclick = ()=>{
    e.title = $("#f-title").value.trim() || "（未命名）";
    e.category = $("#f-cat").value.trim();
    e.module = $("#f-mod").value;
    e.status = $("#f-status").value;
    e.content = $("#f-content").value;
    e.tags = $("#f-tags").value.trim();
    e.related = $("#f-rel").value.trim();
    e.notes = $("#f-notes").value.trim();
    editing=false; curModule=e.module; persist(true); renderAll(); toast("已保存 "+e.id);
  };
  $("#btn-cancel").onclick = ()=>{ editing=false; renderDetail(); };
}
function renderAll(){ renderNav(); renderList(); renderDetail(); }

/* ---------------- 剧本流程图 ---------------- */
const CAT_COLOR = {"演出":"var(--amber)","对话":"var(--teal)","玩法":"var(--red)","条件池":"var(--grey)","收束":"var(--green)","方法论":"var(--paper-dim)"};
function renderFlow(list){
  const box = $("#cards");
  if(!list.length){ box.innerHTML = '<div class="empty">没有可绘制的节点。</div>'; return; }
  const byId = {}; list.forEach(e=>byId[e.id]=e);
  const edges = [];
  list.forEach(e=>(e.related||"").split(";").map(s=>s.trim()).filter(Boolean).forEach(r=>{
    if(byId[r] && r!==e.id) edges.push([e.id, r]);
  }));
  // Kahn分层（最长路径），环兜底
  const indeg = {}; list.forEach(e=>indeg[e.id]=0);
  edges.forEach(([a,b])=>indeg[b]++);
  const out = {}; edges.forEach(([a,b])=>{ (out[a]=out[a]||[]).push(b); });
  const layer = {}; list.forEach(e=>layer[e.id]=0);
  let q = list.filter(e=>indeg[e.id]===0).map(e=>e.id);
  if(!q.length) q = [list[0].id]; // 全环兜底
  const deg = {...indeg}; const seen = new Set();
  while(q.length){
    const n = q.shift(); if(seen.has(n)) continue; seen.add(n);
    (out[n]||[]).forEach(m=>{ layer[m]=Math.max(layer[m], layer[n]+1); if(--deg[m]<=0 && !seen.has(m)) q.push(m); });
  }
  const cols = {};
  list.forEach(e=>{ (cols[layer[e.id]]=cols[layer[e.id]]||[]).push(e); });
  const NW=200, NH=58, GX=64, GY=22, PAD=24;
  const maxL = Math.max(...list.map(e=>layer[e.id]));
  const maxRows = Math.max(...Object.values(cols).map(c=>c.length));
  const W = PAD*2 + (maxL+1)*NW + maxL*GX;
  const H = PAD*2 + maxRows*NH + (maxRows-1)*GY + 20;
  const pos = {};
  Object.entries(cols).forEach(([l, arr])=>{
    arr.sort((a,b)=>a.id.localeCompare(b.id));
    arr.forEach((e,i)=>pos[e.id] = {x: PAD + l*(NW+GX), y: PAD + i*(NH+GY)});
  });
  let svg = `<svg width="${W}" height="${H}" style="min-width:${W}px">`;
  // 连线
  edges.forEach(([a,b])=>{
    const p = pos[a], t = pos[b];
    const x1 = p.x+NW, y1 = p.y+NH/2, x2 = t.x, y2 = t.y+NH/2;
    const mx = (x1+x2)/2;
    svg += `<path d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}" fill="none" stroke="var(--line)" stroke-width="1.5"/>`;
    svg += `<circle cx="${x2}" cy="${y2}" r="3" fill="var(--amber)"/>`;
  });
  // 节点
  list.forEach(e=>{
    const p = pos[e.id], c = CAT_COLOR[e.category]||"var(--paper-dim)";
    const sel = e.id===curId;
    svg += `<g class="flownode" data-id="${esc(e.id)}" style="cursor:pointer">
      <rect x="${p.x}" y="${p.y}" width="${NW}" height="${NH}" rx="3"
        fill="${sel?'#2e2412':'var(--panel)'}" stroke="${sel?'var(--amber)':'var(--line)'}" stroke-width="${sel?2:1}"/>
      <rect x="${p.x}" y="${p.y}" width="4" height="${NH}" fill="${c}"/>
      <text x="${p.x+14}" y="${p.y+20}" fill="var(--paper-dim)" font-size="10" letter-spacing="1">${esc(e.id)} · ${esc(e.category)}</text>
      <text x="${p.x+14}" y="${p.y+40}" fill="var(--paper)" font-size="12.5" font-weight="600">${esc(e.title.length>14?e.title.slice(0,14)+"…":e.title)}</text>
    </g>`;
  });
  svg += `</svg>`;
  box.innerHTML = `<div class="flowwrap">${svg}</div>
    <div class="flowlegend">${Object.entries(CAT_COLOR).map(([k,v])=>`<span><i style="background:${v}"></i>${k}</span>`).join("")}
    <span style="margin-left:auto;color:var(--paper-dim)">箭头方向＝related字段流向 · 点击节点查看详情</span></div>`;
  box.querySelectorAll(".flownode").forEach(g=>g.onclick=()=>{
    curId = g.dataset.id; editing=false; renderList(); renderDetail(); $("#detailpane").classList.add("open");
  });
}

/* ---------------- 新词条 ---------------- */
const PREFIX = {overview:"OV",lore:"LO",story:"ST",script:"SC",characters:"CH",systems:"SY",maps:"MP",quests:"QU",items:"IT",dialogue:"DL",eggs:"EG",questions:"QS"};
let flowMode = false;
function nextId(mod){
  const p = PREFIX[mod]||"XX";
  let n = 1;
  db.filter(e=>e.id.startsWith(p+"-")).forEach(e=>{
    const v = parseInt(e.id.split("-")[1],10);
    if(!isNaN(v) && v>=n) n = v+1;
  });
  return p+"-"+String(n).padStart(3,"0");
}
$("#btn-new").onclick = ()=>{
  const mod = curModule==="__all__" ? "overview" : curModule;
  const e = {id:nextId(mod),module:mod,category:"",title:"",content:"",tags:"",status:"灵感",related:"",notes:""};
  db.push(e); curId=e.id; editing=true; renderAll();
  $("#detailpane").classList.add("open");
};

/* ---------------- 工具栏 ---------------- */
$("#btn-export").onclick = exportCSV;
$("#btn-import").onclick = ()=>$("#filepick").click();
$("#filepick").onchange = ev=>{ if(ev.target.files[0]) importCSV(ev.target.files[0]); ev.target.value=""; };
$("#btn-save").onclick = ()=>persist(false);
$("#btn-reset").onclick = ()=>{
  if(!confirm("重置为内置初始数据？当前修改将丢失（建议先导出CSV）。")) return;
  db = JSON.parse(JSON.stringify(SEED)); curId=null; persist(true); renderAll(); toast("已重置");
};
$("#searchbox").oninput = ev=>{
  searchTerm = ev.target.value.trim();
  if(searchTerm){ curModule = "__all__"; } else if(curModule==="__all__"){ curModule = "overview"; }
  renderAll();
};
document.addEventListener("keydown", ev=>{
  if(ev.key==="/" && document.activeElement.tagName!=="INPUT" && document.activeElement.tagName!=="TEXTAREA"){
    ev.preventDefault(); $("#searchbox").focus();
  }
  if(ev.key==="Escape"){ $("#detailpane").classList.remove("open"); }
});

/* ---------------- 密码门 ---------------- */
const GATE_PASS = "2333";
function tryUnlock(){
  const v = $("#gate-input").value.trim();
  if(v === GATE_PASS){
    $("#gate").remove();
    $("#app").classList.remove("locked");
    initApp();
  }else{
    const g = $("#gate");
    g.classList.remove("shake"); void g.offsetWidth; g.classList.add("shake");
    $("#gate-input").value = "";
    $("#gate-input").focus();
  }
}
$("#gate-btn").onclick = tryUnlock;
$("#gate-input").addEventListener("keydown", ev=>{ if(ev.key==="Enter") tryUnlock(); });

/* ---------------- 启动 ---------------- */
async function initApp(){
  await loadDB();
  renderAll();
}
$("#gate-input").focus();
</script>
