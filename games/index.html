<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深渊低语 | Whispers of the Abyss</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap');

  :root {
    --black: #080a0f;
    --deep: #0d1117;
    --panel: #111820;
    --border: #1e2d3d;
    --dim: #2a3f52;
    --text: #a8b8c8;
    --muted: #5a7a8a;
    --accent: #4a9e8e;
    --danger: #8e2a2a;
    --sanity-color: #4a9e8e;
    --health-color: #8e4a2a;
    --gold: #b8962a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 16px;
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Ambient background animation */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 40%, rgba(20,40,60,0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 70%, rgba(10,30,20,0.2) 0%, transparent 40%);
    animation: drift 20s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes drift {
    0% { transform: translate(0,0) rotate(0deg); }
    100% { transform: translate(3%,2%) rotate(2deg); }
  }

  .game-container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 820px;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Header */
  .game-header {
    text-align: center;
    padding: 20px 0 8px;
    border-bottom: 1px solid var(--border);
  }

  .game-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--accent);
    letter-spacing: 0.12em;
    text-shadow: 0 0 30px rgba(74,158,142,0.4);
  }

  .game-subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    font-style: italic;
    margin-top: 4px;
  }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }

  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
  }

  .stat-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-bar-wrap {
    height: 6px;
    background: var(--dim);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .stat-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease, background 0.3s;
  }

  .stat-value {
    font-size: 0.8rem;
    color: var(--text);
  }

  .sanity-fill { background: var(--sanity-color); }
  .health-fill { background: var(--health-color); }
  .items-count {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    color: var(--gold);
  }

  /* Scene panel */
  .scene-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .scene-image {
    width: 100%;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--deep);
    font-size: 5rem;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .scene-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(8,10,15,0.7) 100%);
  }

  .scene-emoji {
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 0 20px rgba(74,158,142,0.3));
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }

  .scene-content {
    padding: 20px 24px;
  }

  .scene-location {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .scene-text {
    font-size: 1rem;
    color: var(--text);
    line-height: 1.8;
    font-style: italic;
  }

  .scene-text .highlight {
    color: var(--accent);
    font-style: normal;
  }

  /* Log */
  .log-panel {
    background: var(--deep);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 18px;
    height: 120px;
    overflow-y: auto;
    scroll-behavior: smooth;
  }

  .log-panel::-webkit-scrollbar { width: 4px; }
  .log-panel::-webkit-scrollbar-track { background: var(--deep); }
  .log-panel::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  .log-entry {
    font-size: 0.82rem;
    color: var(--muted);
    padding: 2px 0;
    border-bottom: 1px solid rgba(30,45,61,0.4);
  }
  .log-entry:last-child { border: none; }
  .log-entry.new { color: var(--text); animation: fadeLog 0.4s ease; }
  .log-entry.danger { color: #c05050; }
  .log-entry.good { color: var(--accent); }
  .log-entry.warn { color: var(--gold); }

  @keyframes fadeLog {
    from { opacity: 0; transform: translateX(-4px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Choices */
  .choices-panel {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .choice-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 13px 20px;
    color: var(--text);
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 0.95rem;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .choice-btn:hover {
    border-color: var(--accent);
    background: rgba(74,158,142,0.08);
    color: #d0e8e0;
    transform: translateX(3px);
  }

  .choice-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .choice-icon {
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .choice-cost {
    margin-left: auto;
    font-size: 0.75rem;
    font-family: 'Cinzel', serif;
    color: var(--muted);
    white-space: nowrap;
  }

  .cost-sanity { color: #4a9e8e; }
  .cost-health { color: #c06040; }

  /* Inventory */
  .inventory-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 18px;
  }

  .inv-title {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .inv-items {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .inv-item {
    background: var(--deep);
    border: 1px solid var(--dim);
    border-radius: 3px;
    padding: 5px 10px;
    font-size: 0.8rem;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .inv-empty {
    color: var(--muted);
    font-style: italic;
    font-size: 0.85rem;
  }

  /* Game over / win screens */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(8,10,15,0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    text-align: center;
    padding: 32px;
    display: none;
  }

  .overlay.show { display: flex; animation: fadeIn 1s ease; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .overlay-icon { font-size: 5rem; margin-bottom: 20px; }
  .overlay-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    margin-bottom: 12px;
  }
  .overlay-title.bad { color: #c05050; text-shadow: 0 0 30px rgba(200,50,50,0.4); }
  .overlay-title.good { color: var(--accent); text-shadow: 0 0 30px rgba(74,158,142,0.4); }
  .overlay-desc { color: var(--muted); font-style: italic; max-width: 480px; margin-bottom: 28px; line-height: 1.8; }

  .restart-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    padding: 12px 32px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
  }

  .restart-btn:hover {
    background: rgba(74,158,142,0.15);
  }

  /* Sanity flicker effect */
  @keyframes insane {
    0%, 100% { opacity: 1; }
    92% { opacity: 1; }
    94% { opacity: 0.3; }
    96% { opacity: 1; }
    98% { opacity: 0.5; }
  }

  .insane { animation: insane 3s infinite; }

  /* Tentacle watermark */
  .tentacle-bg {
    position: fixed;
    bottom: -5%;
    right: -5%;
    font-size: 18rem;
    opacity: 0.02;
    pointer-events: none;
    z-index: 0;
    transform: rotate(-20deg);
    user-select: none;
  }

  /* Volume toggle button */
  .volume-btn {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 50;
    width: 40px;
    height: 40px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    color: var(--text);
  }
  .volume-btn:hover {
    border-color: var(--accent);
    background: rgba(74,158,142,0.12);
    transform: scale(1.08);
  }
  .volume-btn.muted {
    border-color: var(--danger);
    color: var(--muted);
  }
  .volume-btn.muted:hover {
    border-color: #c05050;
    background: rgba(142,42,42,0.12);
  }
</style>
</head>
<body>

<!-- BGM -->
<audio id="bgm" src="DeepBelow.mp3" loop preload="auto"></audio>

<!-- Volume Toggle -->
<button class="volume-btn" id="volumeBtn" title="切换音乐" onclick="toggleVolume()">🔊</button>

<div class="tentacle-bg">🐙</div>

<!-- Game Over Overlay -->
<div class="overlay" id="gameOverOverlay">
  <div class="overlay-icon">💀</div>
  <div class="overlay-title bad">灵魂湮灭</div>
  <div class="overlay-desc" id="gameOverDesc">你的理智已彻底崩溃。永恒的黑暗将你吞噬，你的名字将被遗忘在无尽的深渊之中。</div>
  <button class="restart-btn" onclick="restartGame()">再次探索</button>
</div>

<!-- Win Overlay -->
<div class="overlay" id="winOverlay">
  <div class="overlay-icon">🌊</div>
  <div class="overlay-title good">深渊凝视着你</div>
  <div class="overlay-desc">你封印了古神，却也永远失去了一部分自我。拉莱耶的低语将伴随你余生，而你……再也不是曾经的那个人了。</div>
  <button class="restart-btn" onclick="restartGame()">重新开始</button>
</div>

<div class="game-container">
  <div class="game-header">
    <div class="game-title">深渊低语</div>
    <div class="game-subtitle">Whispers of the Abyss · A Cthulhu Mythos Adventure</div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">理智值</div>
      <div class="stat-bar-wrap">
        <div class="stat-bar-fill sanity-fill" id="sanityBar" style="width:100%"></div>
      </div>
      <div class="stat-value"><span id="sanityVal">100</span> / 100</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">生命值</div>
      <div class="stat-bar-wrap">
        <div class="stat-bar-fill health-fill" id="healthBar" style="width:100%"></div>
      </div>
      <div class="stat-value"><span id="healthVal">100</span> / 100</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">物品</div>
      <div class="items-count" id="itemCount">0</div>
      <div class="stat-value" style="font-size:0.72rem; color:var(--muted)">件道具</div>
    </div>
  </div>

  <!-- Scene -->
  <div class="scene-panel" id="scenePanel">
    <div class="scene-image">
      <div class="scene-emoji" id="sceneEmoji">🌊</div>
    </div>
    <div class="scene-content">
      <div class="scene-location" id="sceneLocation">——</div>
      <div class="scene-text" id="sceneText">正在加载...</div>
    </div>
  </div>

  <!-- Log -->
  <div class="log-panel" id="logPanel">
    <div class="log-entry">游戏开始。愿上帝保佑你的灵魂。</div>
  </div>

  <!-- Choices -->
  <div class="choices-panel" id="choicesPanel"></div>

  <!-- Inventory -->
  <div class="inventory-panel">
    <div class="inv-title">随身物品</div>
    <div class="inv-items" id="invItems">
      <div class="inv-empty">空无一物</div>
    </div>
  </div>
</div>

<script>
// ===== GAME STATE =====
let state = {
  sanity: 100,
  health: 100,
  inventory: [],
  currentScene: 'start',
  flags: {}
};

// ===== SCENES =====
const scenes = {
  start: {
    emoji: '🌙',
    location: '阿卡姆市 · 深夜',
    text: '1923年的深秋，你是一名调查记者。一封神秘信件将你引到了<span class="highlight">阿卡姆市</span>——那封信只有一行字："他们在召唤它。去图书馆，找那本书。"<br><br>外面的风声像是某种遥远的低吟，令人不安。',
    choices: [
      { text: '前往阿卡姆图书馆', icon: '📚', next: 'library' },
      { text: '先去旅馆休息，明天再说', icon: '🏨', next: 'hotel', sanityGain: 5 },
      { text: '去警察局报告', icon: '🚔', next: 'police' }
    ]
  },

  hotel: {
    emoji: '🕯️',
    location: '阿卡姆旅馆 · 302室',
    text: '你躺在肮脏的床铺上，试图入睡。然而天花板上的水渍开始呈现出<span class="highlight">奇异的形状</span>——像是触手，像是眼睛，像是某个你无法命名的东西。<br><br>半夜，你听到隔壁房间传来低沉的诵念声……',
    choices: [
      { text: '窃听隔壁房间', icon: '👂', next: 'overhear', sanityCost: 5 },
      { text: '蒙住头继续睡', icon: '😴', next: 'morning' },
      { text: '敲门询问', icon: '🚪', next: 'knock', healthCost: 10 }
    ]
  },

  overhear: {
    emoji: '👁️',
    location: '阿卡姆旅馆 · 走廊',
    text: '你将耳朵贴在墙上。那些声音越来越清晰——不是任何你认识的语言，却又像是某种古老的祈祷文。你听到了一个名字，反复被提及：<br><br><span class="highlight">"克苏鲁……克苏鲁……"</span><br><br>突然，声音停了。一阵沉默之后，门缝里塞进来一张纸条。',
    choices: [
      { text: '捡起纸条', icon: '📄', next: 'note', item: '神秘纸条 📄' },
      { text: '拔腿就跑', icon: '🏃', next: 'morning', sanityCost: 10 }
    ]
  },

  note: {
    emoji: '📄',
    location: '阿卡姆旅馆 · 302室',
    text: '纸条上用颤抖的笔迹写着：<br><br><em>"不要去图书馆。他们控制了那里。去海边——<span class="highlight">灯塔下面</span>有真相。烧掉这张纸。"</em><br><br>你将纸条翻过来，背面有一个符号，像章鱼，又像眼睛。',
    choices: [
      { text: '前往灯塔', icon: '🔦', next: 'lighthouse' },
      { text: '还是先去图书馆', icon: '📚', next: 'library' },
      { text: '烧掉纸条离开阿卡姆', icon: '🔥', next: 'escape_early', sanityCost: 5 }
    ]
  },

  knock: {
    emoji: '🚪',
    location: '阿卡姆旅馆 · 303室门口',
    text: '你敲了门。诵念声停止了。片刻后，门开了一条缝。<br><br>一双<span class="highlight">鱼鳞状皮肤的手</span>伸出来，塞给你一枚铜质徽章，然后门重重关上。徽章上刻着一个像章鱼一样的图案。<br><br>你的手开始颤抖。',
    choices: [
      { text: '保留徽章，去图书馆', icon: '📚', next: 'library', item: '深海徽章 🔱' },
      { text: '扔掉徽章，明天离开', icon: '🚃', next: 'escape_early', sanityCost: 10 }
    ]
  },

  morning: {
    emoji: '☁️',
    location: '阿卡姆市 · 清晨',
    text: '早晨的阿卡姆笼罩在灰色的薄雾中。昨夜的事或许只是噩梦？<br><br>然而当你走出旅馆，你看到对面那个男人——他的眼睛<span class="highlight">没有瞳孔</span>，却在直视着你微笑。',
    choices: [
      { text: '前往图书馆', icon: '📚', next: 'library' },
      { text: '跟踪那个男人', icon: '🕵️', next: 'follow_man', sanityCost: 5 }
    ]
  },

  police: {
    emoji: '🚔',
    location: '阿卡姆警察局',
    text: '警察局长用怜悯的眼神看着你，显然认为你疯了。"阿卡姆很平静，"他说，"从来都很平静。"<br><br>当他转身的时候，你看到他脖子后面有一个<span class="highlight">奇怪的纹身</span>——和那封信上的图案一模一样。',
    choices: [
      { text: '装作相信他，迅速离开', icon: '🚶', next: 'library' },
      { text: '质问他纹身的事', icon: '❓', next: 'police_confront', healthCost: 20 }
    ]
  },

  police_confront: {
    emoji: '⚠️',
    location: '阿卡姆警察局 · 后室',
    text: '局长的表情瞬间变了。他按下了什么东西，两个警察冲进来把你拖进后室。<br><br>"你不应该注意到的，"他低语，"现在……你只能加入我们，或者<span class="highlight">永远消失</span>。"<br><br>就在此时，天花板的灯开始闪烁。',
    choices: [
      { text: '趁乱逃跑', icon: '🏃', next: 'library', healthCost: 15 },
      { text: '"我愿意加入"（假装）', icon: '🤝', next: 'cult_spy', item: '信徒长袍 👘' }
    ]
  },

  cult_spy: {
    emoji: '👘',
    location: '秘密集会所',
    text: '他们给你换上长袍，带你进入一个地下室。几十个穿着同样长袍的人围成一圈，中央是一幅巨大的壁画——<br><br>一个<span class="highlight">巨大的触手生物</span>从深海升起，城市在它脚下化为废墟。<br><br>你听到他们低声说："再三天，拉莱耶就会升起。"',
    choices: [
      { text: '趁机偷到仪式卷轴后逃脱', icon: '📜', next: 'got_scroll', item: '封印卷轴 📜', sanityCost: 15 },
      { text: '立刻逃跑去图书馆', icon: '📚', next: 'library', sanityCost: 10 }
    ]
  },

  follow_man: {
    emoji: '🌫️',
    location: '阿卡姆 · 破旧街区',
    text: '你跟随那个男人穿过几条小巷，他的步伐均匀而奇怪——像是<span class="highlight">不完全是人类</span>的走路方式。<br><br>他走进一栋废弃建筑。你在门口犹豫着。里面传来低沉的水声……和呼吸声。',
    choices: [
      { text: '进去', icon: '🚪', next: 'deep_one_lair', sanityCost: 15 },
      { text: '放弃，去图书馆', icon: '📚', next: 'library' }
    ]
  },

  deep_one_lair: {

// ===== RENDER =====
function renderScene(sceneId) {
  const scene = scenes[sceneId];
  if (!scene) return;

  state.currentScene = sceneId;

  document.getElementById('sceneEmoji').textContent = scene.emoji;
  document.getElementById('sceneLocation').textContent = scene.location;
  document.getElementById('sceneText').innerHTML = scene.text;

  // Choices
  const panel = document.getElementById('choicesPanel');
  panel.innerHTML = '';

  const hasItems = state.inventory.length > 0;

  scene.choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';

    // Check if requires item
    const needsItem = choice.requiresItem;
    const canUse = !needsItem || hasItems;
    if (!canUse) btn.disabled = true;

    let costHTML = '';
    if (needsItem && !hasItems) costHTML += `<span class="choice-cost" style="color:#c05050">需要道具</span>`;

    btn.innerHTML = `<span class="choice-icon">${choice.icon}</span>${choice.text}${costHTML}`;

    btn.addEventListener('click', () => handleChoice(choice));
    panel.appendChild(btn);
  });

  updateStats();
}

function handleChoice(choice) {
  // Apply costs/gains
  if (choice.sanityCost) {
    state.sanity = Math.max(0, state.sanity - choice.sanityCost);
    addLog(`理智值 -${choice.sanityCost}`, 'danger');
  }
  if (choice.healthCost) {
    state.health = Math.max(0, state.health - choice.healthCost);
    addLog(`生命值 -${choice.healthCost}`, 'danger');
  }
  if (choice.sanityGain) {
    state.sanity = Math.min(100, state.sanity + choice.sanityGain);
    addLog(`理智值 +${choice.sanityGain}`, 'good');
  }
  if (choice.item) {
    state.inventory.push(choice.item);
    addLog(`获得道具：${choice.item}`, 'good');
  }

  addLog(choice.text, 'new');

  updateStats();

  // Check game over conditions
  if (state.sanity <= 0) {
    document.getElementById('gameOverDesc').textContent = '你的理智已彻底瓦解。脑海中那些古神的低语成为了永恒，而你……已经不再是人类了。';
    document.getElementById('gameOverOverlay').classList.add('show');
    return;
  }
  if (state.health <= 0) {
    document.getElementById('gameOverDesc').textContent = '你的肉体屈服了。但有些时候，死亡比目睹真相要慈悲得多。';
    document.getElementById('gameOverOverlay').classList.add('show');
    return;
  }

  // Special endings
  if (choice.next === '_win') {
    document.getElementById('winOverlay').classList.add('show');
    return;
  }
  if (choice.next === '_restart') {
    restartGame();
    return;
  }

  // Navigate
  renderScene(choice.next);
}

function updateStats() {
  const sp = (state.sanity / 100) * 100;
  const hp = (state.health / 100) * 100;

  document.getElementById('sanityBar').style.width = sp + '%';
  document.getElementById('healthBar').style.width = hp + '%';
  document.getElementById('sanityVal').textContent = state.sanity;
  document.getElementById('healthVal').textContent = state.health;
  document.getElementById('itemCount').textContent = state.inventory.length;

  // Color shift on low sanity
  const sanityColor = state.sanity < 30 ? '#c08040' : state.sanity < 60 ? '#6a9e7e' : '#4a9e8e';
  document.getElementById('sanityBar').style.background = sanityColor;

  // Flicker on very low sanity
  const container = document.querySelector('.game-container');
  if (state.sanity < 20) {
    container.classList.add('insane');
  } else {
    container.classList.remove('insane');
  }

  // Inventory
  const invEl = document.getElementById('invItems');
  if (state.inventory.length === 0) {
    invEl.innerHTML = '<div class="inv-empty">空无一物</div>';
  } else {
    invEl.innerHTML = state.inventory.map(item =>
      `<div class="inv-item">${item}</div>`
    ).join('');
  }
}

function addLog(text, type = '') {
  const log = document.getElementById('logPanel');
  const entry = document.createElement('div');
  entry.className = `log-entry ${type}`;
  entry.textContent = text;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;

  // Remove 'new' class after animation
  if (type === 'new') {
    setTimeout(() => entry.classList.remove('new'), 500);
  }
}

function restartGame() {
  state = { sanity: 100, health: 100, inventory: [], currentScene: 'start', flags: {} };
  document.getElementById('gameOverOverlay').classList.remove('show');
  document.getElementById('winOverlay').classList.remove('show');
  document.getElementById('logPanel').innerHTML = '<div class="log-entry">游戏重新开始。</div>';
  renderScene('start');
}

// Start
renderScene('start');

// ===== BGM =====
const bgm = document.getElementById('bgm');
const volumeBtn = document.getElementById('volumeBtn');
let bgmMuted = false;

bgm.volume = 0.45;

// Try to play immediately; if browser blocks it, show click-to-start overlay
bgm.play().then(() => {
  // Autoplay succeeded, remove overlay if it exists
  const splash = document.getElementById('startSplash');
  if (splash) splash.remove();
}).catch(() => {
  // Autoplay blocked — show overlay
  const splash = document.createElement('div');
  splash.id = 'startSplash';
  splash.style.cssText = `
    position:fixed;inset:0;z-index:999;
    background:rgba(8,10,15,0.92);
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    cursor:pointer;
    animation:fadeIn 0.6s ease;
  `;
  splash.innerHTML = `
    <div style="font-size:3rem;margin-bottom:16px;animation:float 3s ease-in-out infinite;">🐙</div>
    <div style="font-family:'Cinzel',serif;font-size:1rem;letter-spacing:0.25em;color:#4a9e8e;text-transform:uppercase;">点击任意处进入深渊</div>
    <div style="font-size:0.75rem;color:#5a7a8a;margin-top:10px;font-style:italic;">Click anywhere to begin</div>
  `;
  splash.addEventListener('click', () => {
    bgm.play().catch(() => {});
    splash.style.opacity = '0';
    splash.style.transition = 'opacity 0.4s';
    setTimeout(() => splash.remove(), 400);
  });
  document.body.appendChild(splash);
});

function toggleVolume() {
  bgmMuted = !bgmMuted;
  bgm.muted = bgmMuted;
  volumeBtn.textContent = bgmMuted ? '🔇' : '🔊';
  volumeBtn.classList.toggle('muted', bgmMuted);
  if (!bgmMuted && bgm.paused) {
    bgm.play().catch(() => {});
  }
}
