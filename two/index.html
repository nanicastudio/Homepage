<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>假面之夜 · 叙拉古悬案</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Noto+Serif+SC:wght@300;400;600&display=swap');

:root {
  --bg:        #080604;
  --bg2:       #110d08;
  --bg3:       #1a1208;
  --panel:     #1e1508;
  --border:    #3a2a10;
  --gold:      #c9a84c;
  --gold-dim:  #7a6228;
  --red:       #8b1a1a;
  --red-bright:#c0352a;
  --cream:     #e8d8b0;
  --text:      #c8b888;
  --muted:     #6a5830;
  --white:     #f0e8d0;

  /* character colors */
  --angelina:  #9b6bb5;
  --texas:     #3a7ab5;
  --lapland:   #b54a3a;
  --dmitri:    #4a8a5a;
  --harold:    #8a7a3a;
  --sin:       #5a4a7a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif SC', 'Cormorant Garamond', Georgia, serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ─── Ambient candle flicker ─── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 80%, rgba(180,100,20,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 20%, rgba(140,30,20,0.04) 0%, transparent 50%),
    radial-gradient(ellipse 80% 30% at 50% 100%, rgba(100,60,10,0.08) 0%, transparent 40%);
  animation: ambientFlicker 8s ease-in-out infinite alternate;
  pointer-events: none;
}
@keyframes ambientFlicker {
  0%   { opacity: 0.7; }
  33%  { opacity: 1; }
  66%  { opacity: 0.85; }
  100% { opacity: 0.6; }
}

/* ─── Mask watermark ─── */
body::after {
  content: '𝕸';
  position: fixed; bottom: -2%; right: -1%;
  font-size: 30vw; color: rgba(201,168,76,0.025);
  pointer-events: none; z-index: 0;
  font-family: 'Cormorant Garamond', serif;
  line-height: 1; user-select: none;
}

/* ─── Layout ─── */
.game-wrap {
  position: relative; z-index: 1;
  max-width: 900px; margin: 0 auto;
  padding: 0 16px 40px;
  display: flex; flex-direction: column; gap: 0;
}

/* ─── Header ─── */
.game-header {
  text-align: center;
  padding: 32px 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.header-eyebrow {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.7rem; letter-spacing: 0.35em;
  color: var(--muted); text-transform: uppercase;
  margin-bottom: 8px;
}
.header-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.8rem, 5vw, 3rem);
  font-weight: 600; color: var(--gold);
  letter-spacing: 0.06em;
  text-shadow: 0 0 40px rgba(201,168,76,0.35);
  line-height: 1.2;
}
.header-sub {
  font-size: 0.8rem; color: var(--muted);
  font-style: italic; margin-top: 6px;
  letter-spacing: 0.1em;
}

/* ─── Main 2-col layout ─── */
.main-layout {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 20px;
}
@media (max-width: 680px) {
  .main-layout { grid-template-columns: 1fr; }
  .sidebar { order: -1; }
}

/* ─── Dialogue Box ─── */
.dialogue-area {
  display: flex; flex-direction: column; gap: 14px;
}

.scene-banner {
  background: var(--panel);
  border: 1px solid var(--border);
  border-top: 3px solid var(--gold-dim);
  padding: 14px 20px;
  display: flex; align-items: center; gap: 12px;
}
.scene-icon { font-size: 1.6rem; }
.scene-info {}
.scene-label {
  font-size: 0.62rem; letter-spacing: 0.25em;
  color: var(--muted); text-transform: uppercase;
  font-family: 'Cormorant Garamond', serif;
}
.scene-name {
  font-size: 1rem; color: var(--cream);
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600; letter-spacing: 0.05em;
}

/* Chat log */
.chat-log {
  background: var(--bg2);
  border: 1px solid var(--border);
  min-height: 360px; max-height: 420px;
  overflow-y: auto;
  padding: 20px;
  display: flex; flex-direction: column; gap: 16px;
  scroll-behavior: smooth;
}
.chat-log::-webkit-scrollbar { width: 4px; }
.chat-log::-webkit-scrollbar-track { background: var(--bg); }
.chat-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Message bubbles */
.msg {
  display: flex; flex-direction: column; gap: 4px;
  animation: msgIn 0.35s ease;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-header {
  display: flex; align-items: center; gap: 8px;
}
.msg-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0;
  border: 1px solid currentColor;
}
.msg-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.78rem; letter-spacing: 0.12em;
  font-weight: 600; text-transform: uppercase;
}
.msg-body {
  margin-left: 40px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 0 6px 6px 6px;
  padding: 10px 14px;
  font-size: 0.92rem; line-height: 1.75;
  color: var(--cream);
  position: relative;
}
.msg-body::before {
  content: '';
  position: absolute; top: 0; left: -1px;
  width: 3px; height: 100%; border-radius: 3px 0 0 3px;
  background: currentColor;
}

/* character color themes */
.char-angelina .msg-avatar, .char-angelina .msg-name { color: var(--angelina); }
.char-angelina .msg-body { border-left-color: var(--angelina); }
.char-angelina .msg-body::before { background: var(--angelina); }

.char-texas .msg-avatar, .char-texas .msg-name { color: var(--texas); }
.char-texas .msg-body::before { background: var(--texas); }

.char-lapland .msg-avatar, .char-lapland .msg-name { color: var(--lapland); }
.char-lapland .msg-body::before { background: var(--lapland); }

.char-dmitri .msg-avatar, .char-dmitri .msg-name { color: var(--dmitri); }
.char-dmitri .msg-body::before { background: var(--dmitri); }

.char-harold .msg-avatar, .char-harold .msg-name { color: var(--harold); }
.char-harold .msg-body::before { background: var(--harold); }

.char-sin .msg-avatar, .char-sin .msg-name { color: var(--sin); }
.char-sin .msg-body::before { background: var(--sin); }

.char-player .msg-header { flex-direction: row-reverse; }
.char-player .msg-body { margin-left: 0; margin-right: 40px; border-radius: 6px 0 6px 6px; background: #1a1a0a; }
.char-player .msg-body::before { left: auto; right: -1px; background: var(--gold-dim); border-radius: 0 3px 3px 0; }
.char-player .msg-name { color: var(--gold); }
.char-player .msg-avatar { color: var(--gold); border-color: var(--gold-dim); }

/* Narrator */
.msg-narrator {
  text-align: center;
  font-style: italic; color: var(--muted);
  font-size: 0.82rem; letter-spacing: 0.05em;
  padding: 4px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin: 4px 0;
}

/* Choices */
.choices-wrap {
  display: flex; flex-direction: column; gap: 8px;
}
.choice-btn {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Noto Serif SC', Georgia, serif;
  font-size: 0.88rem; line-height: 1.5;
  padding: 11px 16px 11px 44px;
  text-align: left; cursor: pointer;
  border-radius: 2px;
  position: relative;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
}
.choice-btn::before {
  content: attr(data-num);
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.75rem; color: var(--gold-dim);
  letter-spacing: 0.05em;
}
.choice-btn:hover {
  border-color: var(--gold-dim);
  background: rgba(201,168,76,0.06);
  color: var(--cream);
  transform: translateX(3px);
}
.choice-btn:disabled {
  opacity: 0.35; cursor: not-allowed; transform: none;
}
.choice-tag {
  float: right; margin-left: 8px;
  font-size: 0.7rem; color: var(--gold-dim);
  font-family: 'Cormorant Garamond', serif;
  letter-spacing: 0.1em;
}

/* ─── Sidebar ─── */
.sidebar { display: flex; flex-direction: column; gap: 14px; }

.side-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-top: 2px solid var(--gold-dim);
}
.side-title {
  padding: 10px 14px 8px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.65rem; letter-spacing: 0.22em;
  color: var(--muted); text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}
.side-body { padding: 12px 14px; }

/* Evidence board */
.evidence-list { display: flex; flex-direction: column; gap: 8px; }
.evidence-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 8px 10px;
  font-size: 0.78rem; color: var(--text);
  line-height: 1.5;
  position: relative;
  transition: border-color 0.2s;
}
.evidence-item.new-clue {
  border-color: var(--gold);
  animation: clueGlow 1s ease;
}
@keyframes clueGlow {
  0%, 100% { box-shadow: none; }
  50% { box-shadow: 0 0 12px rgba(201,168,76,0.3); }
}
.evidence-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.65rem; color: var(--gold-dim);
  display: block; margin-bottom: 3px; letter-spacing: 0.15em;
}
.evidence-empty { color: var(--muted); font-style: italic; font-size: 0.8rem; }

/* Character status */
.char-list { display: flex; flex-direction: column; gap: 6px; }
.char-status {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(58,42,16,0.5);
  font-size: 0.8rem; cursor: pointer;
  transition: color 0.15s;
}
.char-status:last-child { border-bottom: none; }
.char-status:hover { color: var(--cream); }
.char-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.char-status-name { flex: 1; }
.char-status-tag {
  font-size: 0.68rem; font-family: 'Cormorant Garamond', serif;
  color: var(--muted); letter-spacing: 0.05em;
}
.char-status-tag.questioned { color: var(--gold-dim); }
.char-status-tag.suspicious { color: var(--red-bright); }

/* Progress */
.progress-bar-wrap {
  height: 4px; background: var(--bg);
  border-radius: 2px; overflow: hidden; margin-bottom: 8px;
}
.progress-bar-fill {
  height: 100%; background: var(--gold);
  border-radius: 2px; transition: width 0.5s ease;
}
.progress-text { font-size: 0.75rem; color: var(--muted); }
.progress-text span { color: var(--gold); }

/* Accusation button */
.accuse-btn {
  width: 100%; padding: 11px;
  background: transparent;
  border: 1px solid var(--red);
  color: var(--red-bright);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.85rem; letter-spacing: 0.15em;
  text-transform: uppercase; cursor: pointer;
  transition: all 0.2s; margin-top: 4px;
}
.accuse-btn:hover { background: rgba(139,26,26,0.15); border-color: var(--red-bright); }
.accuse-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ─── Scene nav ─── */
.scene-nav {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-top: 6px;
}
.nav-btn {
  background: var(--bg2); border: 1px solid var(--border);
  padding: 8px 6px; text-align: center;
  font-family: 'Noto Serif SC', serif; font-size: 0.72rem;
  color: var(--muted); cursor: pointer;
  transition: all 0.2s; line-height: 1.4;
}
.nav-btn:hover, .nav-btn.active {
  border-color: var(--gold-dim); color: var(--cream);
  background: rgba(201,168,76,0.05);
}
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-icon { display: block; font-size: 1.2rem; margin-bottom: 3px; }

/* ─── Overlay (accusation / ending) ─── */
.overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(8,6,4,0.96);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px;
  text-align: center;
}
.overlay.show { display: flex; animation: fadeIn 0.6s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.overlay-icon { font-size: 4rem; margin-bottom: 20px; }
.overlay-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.4rem, 4vw, 2.2rem);
  font-weight: 600; margin-bottom: 12px;
  letter-spacing: 0.08em;
}
.overlay-title.correct { color: var(--gold); text-shadow: 0 0 30px rgba(201,168,76,0.4); }
.overlay-title.wrong   { color: var(--red-bright); }
.overlay-title.neutral { color: var(--cream); }
.overlay-body {
  max-width: 540px; font-size: 0.92rem; line-height: 1.85;
  color: var(--text); font-style: italic; margin-bottom: 28px;
}
.overlay-body b { color: var(--cream); font-style: normal; }
.overlay-btn {
  background: transparent; border: 1px solid var(--gold-dim);
  color: var(--gold); padding: 11px 32px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.88rem; letter-spacing: 0.2em;
  text-transform: uppercase; cursor: pointer;
  transition: all 0.2s; margin: 4px;
}
.overlay-btn:hover { background: rgba(201,168,76,0.1); border-color: var(--gold); }

/* Accusation choices in overlay */
.accuse-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 10px; max-width: 480px; width: 100%;
  margin-bottom: 20px;
}
.accuse-char-btn {
  background: var(--panel); border: 1px solid var(--border);
  padding: 14px 10px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  font-family: 'Noto Serif SC', serif; font-size: 0.82rem;
  color: var(--text); transition: all 0.2s;
}
.accuse-char-btn:hover {
  border-color: var(--red); color: var(--cream);
  background: rgba(139,26,26,0.12);
}
.accuse-char-icon { font-size: 1.8rem; }
.accuse-char-name { letter-spacing: 0.05em; }
.accuse-cancel {
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); padding: 9px 24px;
  font-family: 'Cormorant Garamond', serif; font-size: 0.8rem;
  cursor: pointer; letter-spacing: 0.15em; text-transform: uppercase;
  transition: all 0.2s;
}
.accuse-cancel:hover { border-color: var(--border); color: var(--text); }

/* Typing indicator */
.typing-indicator {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; color: var(--muted); font-size: 0.8rem; font-style: italic;
}
.typing-dots { display: flex; gap: 4px; }
.typing-dots span {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--muted); animation: typingBounce 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-5px); opacity: 1; }
}

/* highlight text */
.hl-gold { color: var(--gold); }
.hl-red  { color: var(--red-bright); }
.hl-mute { color: var(--muted); font-style: italic; }
</style>
</head>
<body>

<!-- Accusation Overlay -->
<div class="overlay" id="accuseOverlay">
  <div style="font-size:0.7rem;letter-spacing:0.3em;color:var(--muted);text-transform:uppercase;margin-bottom:16px;font-family:'Cormorant Garamond',serif;">指认凶手</div>
  <div class="overlay-title neutral" style="margin-bottom:6px;">你认为——</div>
  <div style="color:var(--muted);font-size:0.85rem;font-style:italic;margin-bottom:22px;">谁是这场假面之夜背后的真正主谋？</div>
  <div class="accuse-grid" id="accuseGrid"></div>
  <button class="accuse-cancel" onclick="closeAccuse()">再想想</button>
</div>

<!-- Ending Overlay -->
<div class="overlay" id="endingOverlay">
  <div class="overlay-icon" id="endIcon"></div>
  <div class="overlay-title" id="endTitle"></div>
  <div class="overlay-body" id="endBody"></div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
    <button class="overlay-btn" onclick="restartGame()">重新调查</button>
  </div>
</div>

<div class="game-wrap">
  <div class="game-header">
    <div class="header-eyebrow">明日方舟 · 叙拉古 · 假面舞会</div>
    <div class="header-title">假面之夜</div>
    <div class="header-sub">Una Notte di Maschere · 一场没有结束的宴会</div>
  </div>

  <div class="main-layout">
    <!-- Left: Dialogue -->
    <div class="dialogue-area">
      <div class="scene-banner">
        <div class="scene-icon" id="sceneIcon">🕯️</div>
        <div class="scene-info">
          <div class="scene-label">当前地点</div>
          <div class="scene-name" id="sceneName">叙拉古 · 贝尔托尼宫殿 · 宴会厅</div>
        </div>
      </div>

      <div class="chat-log" id="chatLog"></div>

      <div class="choices-wrap" id="choicesWrap"></div>

      <!-- Scene nav (hidden initially) -->
      <div id="navWrap" style="display:none;">
        <div style="font-size:0.65rem;letter-spacing:0.22em;color:var(--muted);text-transform:uppercase;font-family:'Cormorant Garamond',serif;margin-bottom:8px;">前往调查</div>
        <div class="scene-nav" id="sceneNav"></div>
      </div>
    </div>

    <!-- Right: Sidebar -->
    <div class="sidebar">
      <!-- Progress -->
      <div class="side-card">
        <div class="side-title">调查进度</div>
        <div class="side-body">
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
          </div>
          <div class="progress-text">已收集线索 <span id="clueCount">0</span> / 5</div>
          <button class="accuse-btn" id="accuseBtn" disabled onclick="openAccuse()">▸ 指认凶手</button>
        </div>
      </div>

      <!-- Evidence -->
      <div class="side-card">
        <div class="side-title">证据板</div>
        <div class="side-body">
          <div class="evidence-list" id="evidenceList">
            <div class="evidence-empty">尚无线索……</div>
          </div>
        </div>
      </div>

      <!-- Characters -->
      <div class="side-card">
        <div class="side-title">相关人物</div>
        <div class="side-body">
          <div class="char-list" id="charList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  GAME DATA
// ═══════════════════════════════════════════════

const CHARS = {
  angelina: { name:'安洁莉娜', icon:'🌸', color:'var(--angelina)' },
  texas:    { name:'德克萨斯', icon:'🗡️', color:'var(--texas)' },
  lapland:  { name:'拉普兰德', icon:'🐺', color:'var(--lapland)' },
  dmitri:   { name:'德米特里', icon:'🎭', color:'var(--dmitri)' },
  harold:   { name:'哈罗德',   icon:'🕰️', color:'var(--harold)' },
  sin:      { name:'斥罪',    icon:'🗂️', color:'var(--sin)' },
  player:   { name:'博士',    icon:'👤', color:'var(--gold)' },
};

// Clue definitions
const CLUES = {
  c1: { title:'破碎的源石酒杯',   desc:'在宴会厅角落发现，边缘有不明粉末残留，并非普通破损。' },
  c2: { title:'德米特里的证词',   desc:'德米特里声称在舞会最高峰时曾见博士独自走向北翼走廊。' },
  c3: { title:'拉普兰德的异样',   desc:'拉普兰德腕部有新鲜抓痕，她说是舞会中碰瓷，但方向不对。' },
  c4: { title:'哈罗德的邀请名单', desc:'宾客名单上的某个名字被人为划去，笔迹与哈罗德不同。' },
  c5: { title:'斥罪的密信残片',   desc:'半张烧焦的纸，隐约可见"……午夜之前，务必……北翼……"。' },
};

// ═══════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════
let state = {
  clues: new Set(),
  questioned: new Set(),
  suspicious: new Set(),
  phase: 'intro',   // intro | investigate | accuse
  navUnlocked: false,
};

// ═══════════════════════════════════════════════
//  SCENE DEFINITIONS
// ═══════════════════════════════════════════════
const SCENES = {

  // ── INTRO ──────────────────────────────────
  intro: {

// ═══════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════
function addMsg(charId, html, delay=0) {
  const log = document.getElementById('chatLog');
  const ch = CHARS[charId];
  const div = document.createElement('div');
  div.className = `msg char-${charId}`;

  div.innerHTML = `
    <div class="msg-header">
      <div class="msg-avatar">${ch.icon}</div>
      <div class="msg-name" style="color:${ch.color}">${ch.name}</div>
    </div>
    <div class="msg-body" style="--char-color:${ch.color}">${html}</div>
  `;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function addNarrator(text) {
  const log = document.getElementById('chatLog');
  const div = document.createElement('div');
  div.className = 'msg-narrator';
  div.innerHTML = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function showTyping(charId, duration=800) {
  return new Promise(res => {
    const log = document.getElementById('chatLog');
    const ch = CHARS[charId];
    const div = document.createElement('div');
    div.className = 'typing-indicator';
    div.innerHTML = `<span style="color:${ch.color}">${ch.name}</span><div class="typing-dots"><span></span><span></span><span></span></div>`;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    setTimeout(()=>{ div.remove(); res(); }, duration);
  });
}

function showChoices(choices) {
  const wrap = document.getElementById('choicesWrap');
  wrap.innerHTML = '';
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.setAttribute('data-num', String.fromCharCode(65+i));
    if (c.tag) btn.innerHTML = `${c.text}<span class="choice-tag">${c.tag}</span>`;
    else btn.textContent = c.text;
    btn.addEventListener('click', () => {
      if (c.next === '_nav') {
        showNav();
        wrap.innerHTML = '';
      } else {
        wrap.innerHTML = '';
        enterScene(c.next);
      }
    });
    wrap.appendChild(btn);
  });
}

function addClue(id) {
  if (state.clues.has(id)) return;
  state.clues.add(id);
  renderEvidence();
  updateProgress();

  // Flash the new clue
  const list = document.getElementById('evidenceList');
  const items = list.querySelectorAll('.evidence-item');
  if (items.length > 0) {
    const last = items[items.length-1];
    last.classList.add('new-clue');
    setTimeout(()=>last.classList.remove('new-clue'), 2000);
  }
}

function renderEvidence() {
  const list = document.getElementById('evidenceList');
  if (state.clues.size === 0) {
    list.innerHTML = '<div class="evidence-empty">尚无线索……</div>';
    return;
  }
  list.innerHTML = '';
  let i = 1;
  for (const id of state.clues) {
    const cl = CLUES[id];
    const div = document.createElement('div');
    div.className = 'evidence-item';
    div.innerHTML = `<span class="evidence-num">线索 · ${String(i).padStart(2,'0')}</span><b>${cl.title}</b><br>${cl.desc}`;
    list.appendChild(div);
    i++;
  }
}

function updateProgress() {
  const n = state.clues.size;
  document.getElementById('clueCount').textContent = n;
  document.getElementById('progressBar').style.width = (n/5*100)+'%';
  if (n >= 3) {
    document.getElementById('accuseBtn').disabled = false;
  }
}

function markQuestioned(id) {
  state.questioned.add(id);
  renderCharList();
}
function markSuspicious(id) {
  state.suspicious.add(id);
  renderCharList();
}

function renderCharList() {
  const list = document.getElementById('charList');
  const chars = [
    { id:'angelina', label:'安洁莉娜', role:'向导' },
    { id:'texas',    label:'德克萨斯', role:'可疑' },
    { id:'lapland',  label:'拉普兰德', role:'可疑' },
    { id:'dmitri',   label:'德米特里', role:'目击者' },
    { id:'harold',   label:'哈罗德',   role:'主办人' },
    { id:'sin',      label:'斥罪',    role:'信使' },
  ];
  list.innerHTML = '';
  chars.forEach(c => {
    const ch = CHARS[c.id];
    const questioned = state.questioned.has(c.id);
    const suspicious = state.suspicious.has(c.id);
    const div = document.createElement('div');
    div.className = 'char-status';
    let tag = questioned ? '已问询' : c.role;
    let tagCls = questioned ? 'questioned' : '';
    if (suspicious) { tag = '★ 可疑'; tagCls = 'suspicious'; }
    div.innerHTML = `
      <div class="char-dot" style="background:${ch.color}"></div>
      <span class="char-status-name">${ch.name}</span>
      <span class="char-status-tag ${tagCls}">${tag}</span>
    `;
    list.appendChild(div);
  });
}

function showNav() {
  const wrap = document.getElementById('navWrap');
  const nav = document.getElementById('sceneNav');
  wrap.style.display = 'block';
  nav.innerHTML = '';
  NAV_LOCATIONS.forEach(loc => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.innerHTML = `<span class="nav-icon">${loc.icon}</span>${loc.label}<br><span style="color:var(--muted);font-size:0.68rem">${loc.sub}</span>`;
    btn.addEventListener('click', () => {
      if (loc.id === '_return_angelina') {
        enterScene('angelina_hint');
      } else {
        enterScene(loc.id);
      }
    });
    nav.appendChild(btn);
  });
}

function enterScene(sceneId) {
  const scene = SCENES[sceneId];
  if (!scene) return;

  // Clear nav if entering a char scene
  if (sceneId !== '_nav') {
    document.getElementById('navWrap').style.display = 'none';
  }

  // Update banner
  document.getElementById('sceneIcon').textContent = scene.icon;
  document.getElementById('sceneName').textContent = scene.location;

  // Clear choices
  document.getElementById('choicesWrap').innerHTML = '';

  // Add separator
  addNarrator('— — —');

  // Run scene
  scene.onEnter();
}

// ═══════════════════════════════════════════════
//  ACCUSATION
// ═══════════════════════════════════════════════
function openAccuse() {
  const grid = document.getElementById('accuseGrid');
  grid.innerHTML = '';
  ACCUSATION_CHARS.forEach(c => {
    const ch = CHARS[c.id];
    const btn = document.createElement('button');
    btn.className = 'accuse-char-btn';
    btn.innerHTML = `<div class="accuse-char-icon">${ch.icon}</div><div class="accuse-char-name">${c.label}</div>`;
    btn.addEventListener('click', ()=>{ closeAccuse(); resolveAccusation(c.id); });
    grid.appendChild(btn);
  });
  document.getElementById('accuseOverlay').classList.add('show');
}
function closeAccuse() {
  document.getElementById('accuseOverlay').classList.remove('show');
}

function resolveAccusation(charId) {
  const ending = ENDINGS[charId];
  document.getElementById('endIcon').textContent = ending.icon;
  document.getElementById('endTitle').textContent = ending.title;
  document.getElementById('endTitle').className = `overlay-title ${ending.cls}`;
  document.getElementById('endBody').innerHTML = ending.body;
  document.getElementById('endingOverlay').classList.add('show');
}

// ═══════════════════════════════════════════════
//  UNLOCK INVESTIGATION
// ═══════════════════════════════════════════════
function unlockInvestigation() {
  state.phase = 'investigate';
  state.navUnlocked = true;
  renderCharList();
  addNarrator('调查开始。宫殿仍在进行着宴会，时间有限——在所有宾客离场之前，找到真相。');
  showNav();
  document.getElementById('choicesWrap').innerHTML = '';
}

// ═══════════════════════════════════════════════
//  RESTART
// ═══════════════════════════════════════════════
function restartGame() {
  state = { clues: new Set(), questioned: new Set(), suspicious: new Set(), phase:'intro', navUnlocked:false };
  document.getElementById('endingOverlay').classList.remove('show');
  document.getElementById('accuseOverlay').classList.remove('show');
  document.getElementById('chatLog').innerHTML = '';
  document.getElementById('choicesWrap').innerHTML = '';
  document.getElementById('navWrap').style.display = 'none';
  document.getElementById('sceneNav').innerHTML = '';
  document.getElementById('accuseBtn').disabled = true;
  renderEvidence();
  updateProgress();
  renderCharList();
  document.getElementById('sceneIcon').textContent = '🕯️';
  document.getElementById('sceneName').textContent = '叙拉古 · 贝尔托尼宫殿 · 宴会厅';
  startGame();
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
function startGame() {
  renderCharList();
  SCENES['intro'].onEnter();
}

startGame();
